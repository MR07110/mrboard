<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR BOARD · AI Assistant</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Avvalgi dizayn elementlari (CSS o'sha-o'sha qoladi) */
        :root { --bg-base: #f8fafc; --bg-canvas: #e2e8f0; --brand-primary: #007aff; --text-main: #0f172a; }
        body { font-family: sans-serif; background: var(--bg-canvas); margin: 0; height: 100vh; overflow: hidden; }
        .ai-header { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 15px 25px; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; }
        .ai-container { display: flex; height: calc(100vh - 65px); }
        .canvas-preview { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; border-right: 1px solid #ccc; }
        .drawing-area { background: white; border-radius: 15px; border: 2px solid #bbb; width: 100%; max-width: 500px; aspect-ratio: 1; }
        #drawCanvas { width: 100%; height: 100%; cursor: crosshair; border-radius: 13px; }
        .ai-panel { width: 400px; background: white; display: flex; flex-direction: column; }
        .ai-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 85%; font-size: 14px; }
        .message.ai { background: #e9ecef; align-self: flex-start; }
        .message.user { background: var(--brand-primary); color: white; align-self: flex-end; }
        .ai-input-area { padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        .ai-input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        .send-btn, .tool-btn { padding: 10px 15px; border-radius: 20px; border: none; background: var(--brand-primary); color: white; cursor: pointer; }
        .loading { font-style: italic; color: #777; font-size: 12px; }
        .shape-box { background: #f0f7ff; border-left: 4px solid var(--brand-primary); padding: 10px; margin-top: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="ai-header">
        <div style="font-weight: 800; color: var(--brand-primary);">MR BOARD AI</div>
        <button class="tool-btn" onclick="clearCanvas()">Tozalash</button>
    </div>

    <div class="ai-container">
        <div class="canvas-preview">
            <div class="drawing-area">
                <canvas id="drawCanvas" width="500" height="500"></canvas>
            </div>
            <button class="send-btn" style="margin-top: 15px; width: 100%; max-width: 500px;" onclick="detectShape()">Shaklni aniqlash</button>
        </div>

        <div class="ai-panel">
            <div class="ai-messages" id="chatBox">
                <div class="message ai">Assalomu alaykum! Men MR BOARD AI. Muhammadrasul tomonidan yaratilganman. Shakl chizing va men uni tahlil qilaman.</div>
            </div>
            <div class="ai-input-area">
                <input type="text" id="userInput" class="ai-input" placeholder="Savol so'rang...">
                <button class="send-btn" onclick="handleChat()">Yuborish</button>
            </div>
        </div>
    </div>

    <script>
        // 1. API SOZLAMALARI
        const API_KEY = "SIZNING_GEMINI_API_KEYINGIZ"; // https://aistudio.google.com dan oling
        const MODEL_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        // 2. CANVAS MANTIQI
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#007aff';

        canvas.onmousedown = (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); };
        canvas.onmousemove = (e) => { if(drawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } };
        window.onmouseup = () => { drawing = false; };

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // 3. SHAKLNI ANIQLASH (VISION)
        async function detectShape() {
            const base64Image = canvas.toDataURL('image/png').split(',')[1];
            addMessage('ai', 'Tahlil qilinmoqda...', 'loading-status');

            try {
                const response = await fetch(MODEL_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                {text: "Rasmda qanday geometrik shakl chizilgan? O'zbek tilida qisqa javob bering va JSON formatda shakl xususiyatlarini (shape, confidence, tips) keltiring."},
                                {inline_data: {mime_type: "image/png", data: base64Image}}
                            ]
                        }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                document.getElementById('loading-status')?.remove();
                addMessage('ai', `<div class="shape-box">${aiText}</div>`);
            } catch (err) {
                addMessage('ai', "Xatolik: API kalitni tekshiring yoki VPN yoqing.");
            }
        }

        // 4. CHAT MANTIQI
        async function handleChat() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;

            addMessage('user', text);
            input.value = '';

            try {
                const response = await fetch(MODEL_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{text: `Siz MR BOARD yordamchisisiz. Muhammadrasul yaratgan. Javobni o'zbek tilida bering: ${text}`}] }]
                    })
                });
                const data = await response.json();
                addMessage('ai', data.candidates[0].content.parts[0].text);
            } catch (e) { addMessage('ai', "Xatolik yuz berdi."); }
        }

        function addMessage(sender, text, id = "") {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            if(id) div.id = id;
            div.innerHTML = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
