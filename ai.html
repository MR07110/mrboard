<!DOCTYPE html>
<html lang="uz" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>MR BOARD AI · Do'stona Yordamchi</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-base: #ffffff;
            --bg-alt: #f8fafc;
            --bg-glass: rgba(255,255,255,0.72);
            --bg-panel: rgba(255,255,255,0.94);
            --text-main: #0a0c10;
            --text-muted: #5b6e8c;
            --border-strong: #e2e8f0;
            --brand-primary: #007aff;
            --brand-primary-dark: #0056b3;
            --brand-alpha: rgba(0,122,255,0.08);
            --state-success: #34c759;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.02);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.04);
            --shadow-lg: 0 24px 48px -12px rgba(0,0,0,0.08);
            --shadow-xl: 0 32px 64px -16px rgba(0,0,0,0.1);
            --ease-smooth: cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --ease-spring: cubic-bezier(0.34, 1.4, 0.64, 1);
            --transition-fast: 0.2s;
            --transition-normal: 0.35s;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui;
            background: var(--bg-alt);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 16px 24px;
            background: var(--bg-glass);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border-strong);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            text-decoration: none;
            color: var(--text-main);
            transition: all var(--transition-fast) var(--ease-spring);
        }
        .logo:hover { transform: scale(1.02); }
        .logo span { color: var(--brand-primary); font-weight: 800; }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .new-chat-btn {
            background: var(--brand-alpha);
            border: 1px solid var(--border-strong);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--brand-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all var(--transition-fast);
        }
        .new-chat-btn:hover {
            background: var(--brand-primary);
            color: white;
            transform: translateY(-2px);
        }

        .back-btn {
            background: var(--bg-base);
            border: 1px solid var(--border-strong);
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-main);
            transition: all var(--transition-fast);
        }
        .back-btn:hover { transform: translateY(-2px); border-color: var(--brand-primary); background: var(--brand-alpha); }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            max-width: 1000px;
            width: 100%;
            margin: 20px auto;
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            border-radius: 32px;
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border-strong);
        }

        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-strong);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ai-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ai-avatar svg { width: 28px; height: 28px; color: white; }

        .chat-header-info h2 { font-size: 18px; font-weight: 700; }
        .chat-header-info p { font-size: 12px; color: var(--text-muted); }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .messages-area::-webkit-scrollbar { width: 4px; }
        .messages-area::-webkit-scrollbar-track { background: var(--border-strong); border-radius: 10px; }
        .messages-area::-webkit-scrollbar-thumb { background: var(--brand-primary); border-radius: 10px; }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeSlideUp 0.3s var(--ease-smooth);
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.ai { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--brand-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .message-avatar.ai { background: linear-gradient(135deg, var(--brand-primary), var(--brand-primary-dark)); }
        .message-avatar.user { background: var(--text-muted); }
        .message-avatar svg { width: 18px; height: 18px; color: white; }

        .message-content {
            background: var(--bg-base);
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            border: 1px solid var(--border-strong);
            max-width: 100%;
        }
        .message.ai .message-content {
            background: var(--brand-alpha);
            border-color: transparent;
            border-bottom-left-radius: 4px;
        }
        .message.user .message-content {
            background: var(--brand-primary);
            color: white;
            border-bottom-right-radius: 4px;
            border: none;
        }
        .message-time { font-size: 10px; color: var(--text-muted); margin-top: 6px; }
        .message.user .message-time { color: rgba(255,255,255,0.7); }

        .typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
        .typing-indicator span {
            width: 8px; height: 8px; background: var(--text-muted);
            border-radius: 50%; animation: typingBounce 1.4s infinite ease-in-out both;
        }
        @keyframes typingBounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }

        .input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--border-strong);
            display: flex;
            gap: 12px;
            background: var(--bg-panel);
        }
        .chat-input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 44px;
            border: 1px solid var(--border-strong);
            background: var(--bg-base);
            font-size: 14px;
            outline: none;
            transition: all var(--transition-fast);
            font-family: inherit;
        }
        .chat-input:focus { border-color: var(--brand-primary); box-shadow: 0 0 0 3px var(--brand-alpha); }

        .send-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--brand-primary);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast) var(--ease-spring);
        }
        .send-btn:hover { background: var(--brand-primary-dark); transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }

        .quick-questions {
            padding: 12px 24px 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border-top: 1px solid var(--border-strong);
        }
        .quick-q {
            background: var(--brand-alpha);
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--brand-primary);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .quick-q:hover { background: var(--brand-primary); color: white; transform: translateY(-2px); }

        .toast-wrapper {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast-item {
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 13px;
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.3s var(--ease-spring);
            border-left: 3px solid var(--brand-primary);
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 768px) {
            .chat-container { margin: 12px; height: calc(100vh - 24px); }
            .message { max-width: 95%; }
            .quick-questions { padding: 12px 16px 16px; }
            .quick-q { font-size: 11px; padding: 6px 12px; }
            .new-chat-btn span { display: none; }
            .new-chat-btn { padding: 8px 12px; }
        }
    </style>
</head>
<body>

    <div class="toast-wrapper" id="toastWrapper"></div>

    <div class="header">
        <a href="dashboard.html" class="logo">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--brand-primary)" stroke-width="1.8">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                <path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            MR <span>BOARD</span>
        </a>
        <div class="header-actions">
            <button class="new-chat-btn" id="newChatBtn">
                <i data-lucide="plus"></i>
                <span>Yangi suhbat</span>
            </button>
            <a href="dashboard.html" class="back-btn"><i data-lucide="arrow-left"></i><span>Dashboard</span></a>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="ai-avatar">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M12 8V4H8"/><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 12h8"/><path d="M12 8v8"/>
                </svg>
            </div>
            <div class="chat-header-info">
                <h2>MR BOARD AI</h2>
                <p>💬 Do'stona · Savol-javob · Xotira saqlanadi</p>
            </div>
        </div>

        <div class="messages-area" id="messagesArea"></div>

        <div class="quick-questions">
            <button class="quick-q" data-question="xona yarat">🏠 Xona yaratmoqchiman</button>
            <button class="quick-q" data-question="mening xonalarim">📋 Xonalarimni ko'rsat</button>
            <button class="quick-q" data-question="qisqa yo'llar">⌨️ Qisqa yo'llar</button>
            <button class="quick-q" data-question="MR BOARD haqida">📚 MR BOARD haqida</button>
        </div>

        <div class="input-area">
            <input type="text" id="chatInput" class="chat-input" placeholder="Salom! Xona yaratmoqchiman...">
            <button class="send-btn" id="sendBtn"><i data-lucide="send"></i></button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // ========== CONFIG ==========
        const GROQ_API_KEY = "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";
        const GROQ_API_URL = "https://api.groq.com/openai/v1/chat/completions";

        // ========== LOCAL STORAGE (Xotira saqlash) ==========
        let currentUser = null;
        let currentChatId = null;
        let chatHistory = [];
        let pendingAction = null; // Xona yaratish jarayoni uchun
        let waitingFor = null; // "name", "type" yoki null

        // Chatni yuklash
        function loadChat() {
            const saved = localStorage.getItem(`mrboard_ai_chat_${currentUser?.uid || 'guest'}`);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    chatHistory = data.history || [];
                    currentChatId = data.chatId || Date.now().toString();
                    renderMessages();
                } catch(e) { startNewChat(); }
            } else {
                startNewChat();
            }
        }

        // Yangi suhbat
        function startNewChat() {
            chatHistory = [];
            currentChatId = Date.now().toString();
            pendingAction = null;
            waitingFor = null;
            
            const welcomeMsg = {
                role: 'assistant',
                content: `👋 **Salom!** Men MR BOARD AI yordamchisiman.\n\n🤗 **Do'stona suhbat** qilamiz, savol-javob orqali ishlaymiz.\n\n🔹 **Misol:** "xona yarat" desangiz, men sizga nomini, turini so'rayman.\n🔹 **Random nom** ham berishim mumkin, sizga yoqqanini tanlaysiz.\n🔹 **Barcha suhbatlar** avtomatik saqlanadi.\n🔹 **"Yangi suhbat"** tugmasi bilan tozalashingiz mumkin.\n\n✨ **Nima qilamiz?** Xona yaratmoqchimisiz yoki MR BOARD haqida bilmoqchimisiz?`
            };
            chatHistory.push(welcomeMsg);
            saveChat();
            renderMessages();
        }

        function saveChat() {
            if (!currentUser) return;
            localStorage.setItem(`mrboard_ai_chat_${currentUser.uid}`, JSON.stringify({
                chatId: currentChatId,
                history: chatHistory,
                updatedAt: Date.now()
            }));
        }

        function renderMessages() {
            const container = document.getElementById('messagesArea');
            if (!container) return;
            container.innerHTML = '';
            
            for (const msg of chatHistory) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.role}`;
                
                const avatar = msg.role === 'assistant' 
                    ? `<div class="message-avatar ai"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 8V4H8"/><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 12h8"/><path d="M12 8v8"/></svg></div>`
                    : `<div class="message-avatar user"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>`;
                
                messageDiv.innerHTML = `${avatar}<div class="message-content">${msg.content.replace(/\n/g, '<br>')}<div class="message-time">${msg.time || 'hozir'}</div></div>`;
                container.appendChild(messageDiv);
            }
            container.scrollTop = container.scrollHeight;
        }

        function addMessage(role, content) {
            chatHistory.push({
                role: role,
                content: content,
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
            });
            saveChat();
            renderMessages();
        }

        // ========== FIREBASE ACTIONS ==========
        async function createRoomFinal(name, isPublic, password = null) {
            if (!currentUser) throw new Error('Login qilmagan');
            const roomCode = Math.random().toString(36).substr(2, 6).toUpperCase();
            const teacherSecret = Math.random().toString(36).substr(2, 16);
            
            const userSnap = await firebase.database().ref(`users/${currentUser.uid}`).once('value');
            const userData = userSnap.val() || {};
            
            await firebase.database().ref(`rooms/${roomCode}`).set({
                name: name,
                createdBy: currentUser.uid,
                createdByName: userData.fullName || userData.username || currentUser.email?.split('@')[0],
                createdAt: Date.now(),
                isPublic: isPublic,
                hasPassword: password ? true : false,
                password: password || null,
                isActive: true,
                teacherSecret: teacherSecret,
                elements: {}
            });
            return { roomCode, name };
        }

        async function getMyRooms() {
            if (!currentUser) return [];
            const snap = await firebase.database().ref('rooms').once('value');
            const rooms = snap.val() || {};
            const myRooms = [];
            for (const [id, r] of Object.entries(rooms)) {
                if (r.isActive !== false && r.createdBy === currentUser.uid) {
                    myRooms.push({ id, name: r.name, userCount: r.users ? Object.keys(r.users).length : 0, createdAt: r.createdAt });
                }
            }
            return myRooms.sort((a,b) => b.createdAt - a.createdAt);
        }

        // ========== SAVOL-JAVOB USLUBIDA ISHLASH ==========
        async function handleUserMessage(message) {
            const lower = message.toLowerCase();
            
            // 1. Agar kutayotgan bo'lsak (xona yaratish jarayoni)
            if (waitingFor === 'room_name') {
                let roomName = message.trim();
                if (roomName.toLowerCase().includes('random') || roomName === '?' || roomName === 'ixtiyoriy' || roomName === 'o\'zing tanla') {
                    const randomNames = ['Dasturlash', 'Matematika', 'Fizika', 'Kimyo', 'Biologiya', 'Tarix', 'Ingliz tili', 'San\'at', 'Musiqa', 'Geografiya', 'Adabiyot', 'Algoritmlar', 'Web Dasturlash', 'Mobil Dasturlash', 'Sun\'iy Intellekt'];
                    roomName = randomNames[Math.floor(Math.random() * randomNames.length)];
                    addMessage('assistant', `📝 **Qiziqarli tanlov!** Xona nomini "${roomName}" qilib belgiladim. Xona turi qanday bo'lsin? **Public** (hamma kirishi mumkin) yoki **Private** (parol bilan)?`);
                    waitingFor = 'room_type';
                    pendingAction = { name: roomName };
                    return;
                }
                if (roomName.length < 2) {
                    addMessage('assistant', `😊 Nom juda qisqa bo'lib qoldi. Iltimos, kamida 2 harfli nom yozing yoki "random" deb ayting, men o'zim tanlayman.`);
                    return;
                }
                addMessage('assistant', `✅ **"${roomName}"** nomli xona bo'ladi. Endi xona turini tanlang:\n\n🔓 **Public** - hamma kirishi mumkin\n🔒 **Private** - parol bilan himoyalanadi\n\nQaysi birini tanlaysiz?`);
                waitingFor = 'room_type';
                pendingAction = { name: roomName };
                return;
            }
            
            if (waitingFor === 'room_type') {
                const isPrivate = lower.includes('private') || lower.includes('maxfiy') || lower.includes('parol') || lower.includes('yopiq');
                const isPublic = lower.includes('public') || lower.includes('ochiq') || lower.includes('hamma');
                
                if (!isPrivate && !isPublic) {
                    addMessage('assistant', `🤔 Kechirasiz, tushunmadim. Xona turi: **Public** (hamma kirishi mumkin) yoki **Private** (parol bilan)?`);
                    return;
                }
                
                const password = isPrivate ? Math.random().toString(36).substr(2, 6) : null;
                
                addMessage('assistant', `⏳ Xona yaratilmoqda, biroz sabr qiling...`);
                
                try {
                    const { roomCode, name } = await createRoomFinal(pendingAction.name, !isPrivate, password);
                    
                    let response = `🎉 **Xona muvaffaqiyatli yaratildi!**\n\n`;
                    response += `📌 **Xona nomi:** ${name}\n`;
                    response += `🔑 **Xona kodi:** \`${roomCode}\`\n`;
                    if (password) response += `🔒 **Parol:** \`${password}\`\n`;
                    response += `\n💡 Bu kodni doskaga kirish uchun boshqalarga berishingiz mumkin.\n\n🔗 **Xonaga kirish:** "${roomCode} kodli xonaga kir" deb yozing.`;
                    
                    addMessage('assistant', response);
                    
                    // Jarayonni tugatish
                    waitingFor = null;
                    pendingAction = null;
                    
                    // Xonalar ro'yxatini yangilash
                    const rooms = await getMyRooms();
                    if (rooms.length > 0) {
                        addMessage('assistant', `📋 **Mening xonalarim:** ${rooms.length} ta xonangiz bor. "xonalarim" deb yozib ko'rishingiz mumkin.`);
                    }
                } catch(e) {
                    addMessage('assistant', `❌ Xatolik yuz berdi: ${e.message}. Iltimos, qaytadan urinib ko'ring.`);
                    waitingFor = null;
                    pendingAction = null;
                }
                return;
            }
            
            // 2. Xona yaratishni boshlash
            if (lower.includes('xona yarat') || lower.includes('yangi xona') || lower.includes('create room')) {
                addMessage('assistant', `🎯 **Yangi xona yaratish uchun:**\n\n📝 **Xona nomi** nima bo'lsin?\n\n💡 *Menga "random" desangiz, o'zim chiroyli nom tanlayman.*`);
                waitingFor = 'room_name';
                return;
            }
            
            // 3. Mening xonalarim
            if (lower.includes('mening xonalarim') || lower.includes('xonalarim') || lower.includes('my rooms')) {
                const rooms = await getMyRooms();
                if (rooms.length === 0) {
                    addMessage('assistant', `📭 **Hozircha xonangiz yo'q.**\n\n🔹 "xona yarat" deb yozing, men sizga yordam beraman!`);
                } else {
                    let response = `📋 **Sizning xonalaringiz (${rooms.length} ta):**\n\n`;
                    for (const r of rooms) {
                        response += `• **${r.name}**\n  🔑 Kod: \`${r.id}\` | 👥 ${r.userCount} kishi\n`;
                    }
                    response += `\n💡 Xonaga kirish uchun: \`${rooms[0]?.id} kodli xonaga kir\` deb yozing.`;
                    addMessage('assistant', response);
                }
                return;
            }
            
            // 4. Qisqa yo'llar
            if (lower.includes('qisqa yo\'l') || lower.includes('shortcut') || lower.includes('klaviatura')) {
                addMessage('assistant', `⌨️ **MR BOARD qisqa yo'llari:**\n\n• **B** → Qalam\n• **E** → O'chirgich\n• **L** → Lazer\n• **H** → Surish (Pan)\n• **Ctrl+Z** → Bekor qilish\n• **M** → Mikrofon\n• **C** → Chat\n• **U** → Foydalanuvchilar\n• **F** → To'liq ekran\n• **Esc** → Chiqish\n\n💡 Bu tugmalar bilan ishlash ancha tezlashadi!`);
                return;
            }
            
            // 5. MR BOARD haqida
            if (lower.includes('mr board haqida') || lower.includes('about') || lower.includes('nima bu')) {
                addMessage('assistant', `📚 **MR BOARD** - Muhammadrasul Qosimov tomonidan yaratilgan zamonaviy interaktiv whiteboard platformasi.\n\n✨ **Asosiy xususiyatlar:**\n• Cheksiz doska\n• Qalam, o'chirgich, lazer\n• Ovozli muloqot (WebRTC)\n• Real-time chat\n• Public/Private xonalar\n• Minimap\n• JSON/PNG eksport\n• Dark/Light mode\n\n👨‍💻 Muallif: Muhammadrasul Qosimov\n📦 Versiya: Enterprise Ultimate 2.0\n\n❓ Yana nimani bilmoqchisiz?`);
                return;
            }
            
            // 6. Groq AI ga yuborish (boshqa savollar)
            addMessage('assistant', `🤔 **Kuting, o'ylayapman...**`);
            
            try {
                const response = await fetch(GROQ_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: `Siz MR BOARD AI yordamchisisiz. Do'stona, iliq, qiziqarli suhbat qiling. Foydalanuvchi bilan savol-javob uslubida gaplashing. Javoblarni qisqa, ammo foydali qiling. O'zbek tilida javob bering.` },
                            { role: "user", content: message }
                        ],
                        max_tokens: 400,
                        temperature: 0.8
                    })
                });
                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                // Oxirgi "Kuting" xabarini o'chirib, yangisini qo'shamiz
                chatHistory.pop();
                saveChat();
                renderMessages();
                addMessage('assistant', aiResponse);
                
            } catch(e) {
                chatHistory.pop();
                saveChat();
                renderMessages();
                addMessage('assistant', `❌ Kechirasiz, texnik xatolik yuz berdi. Iltimos, qaytadan urinib ko'ring.`);
            }
        }
        
        // ========== SEND MESSAGE ==========
        let isLoading = false;
        
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message || isLoading) return;
            
            addMessage('user', message);
            input.value = '';
            isLoading = true;
            
            await handleUserMessage(message);
            
            isLoading = false;
            input.focus();
        }
        
        // ========== AUTH ==========
        const firebaseConfig = {
            apiKey: "AIzaSyDAsbqgXxl69P-yhOn3L2puTBmLxG70Ao0",
            authDomain: "basic-formula-484419-k8.firebaseapp.com",
            databaseURL: "https://basic-formula-484419-k8-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "basic-formula-484419-k8",
            storageBucket: "basic-formula-484419-k8.firebasestorage.app",
            messagingSenderId: "629679926764",
            appId: "1:629679926764:web:0cff483e9c4752fbd024c9"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                loadChat();
                
                const snap = await firebase.database().ref(`users/${user.uid}`).once('value');
                const data = snap.val() || {};
                const userName = data.fullName || data.username || user.email?.split('@')[0];
                
                // Agar suhbat juda eski bo'lsa, yangi emas
                if (chatHistory.length <= 1) {
                    addMessage('assistant', `👋 **Salom ${userName}!** Xush kelibsiz!\n\n🤗 Menga istalgancha savol berishingiz mumkin. "xona yarat" deb yozing, men sizga yordam beraman.\n\n🎯 Xonalaringizni ko'rish uchun "xonalarim" deb yozing.`);
                }
            } else {
                window.location.href = 'board.html';
            }
        });
        
        // ========== EVENT LISTENERS ==========
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        document.getElementById('newChatBtn').addEventListener('click', () => {
            if (confirm('Yangi suhbat boshlansin? Avvalgi suhbat saqlanmaydi.')) {
                startNewChat();
            }
        });
        
        document.querySelectorAll('.quick-q').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('chatInput').value = btn.dataset.question;
                sendMessage();
            });
        });
    </script>
