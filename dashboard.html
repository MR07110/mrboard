<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MR BOARD · Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* ========== LIGHT MODE (DEFAULT) ========== */
        :root {
            --bg-base: #ffffff;
            --bg-alt: #f8fafc;
            --bg-glass: rgba(255,255,255,0.65);
            --bg-panel: rgba(255,255,255,0.85);
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-subtle: #e2e8f0;
            --border-strong: rgba(0,0,0,0.05);
            --brand-primary: #007aff;
            --brand-primary-dark: #0056b3;
            --brand-alpha: rgba(0,122,255,0.1);
            --brand-alpha-hover: rgba(0,122,255,0.2);
            --state-danger: #ff3b30;
            --state-success: #34c759;
            --state-warning: #ffcc00;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 24px 48px -12px rgba(0,0,0,0.15);
            --shadow-hover: 0 20px 40px -12px rgba(0,122,255,0.25);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-fast: 0.2s;
            --transition-normal: 0.3s;
        }

        /* ========== DARK MODE ========== */
        [data-theme="dark"] {
            --bg-base: #020617;
            --bg-alt: #0f172a;
            --bg-glass: rgba(15,23,42,0.65);
            --bg-panel: rgba(15,23,42,0.85);
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-subtle: rgba(255,255,255,0.1);
            --border-strong: rgba(255,255,255,0.05);
            --brand-primary: #0a84ff;
            --brand-primary-dark: #007aff;
            --brand-alpha: rgba(10,132,255,0.15);
            --brand-alpha-hover: rgba(10,132,255,0.25);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.3);
            --shadow-lg: 0 24px 48px -12px rgba(0,0,0,0.4);
            --shadow-hover: 0 20px 40px -12px rgba(10,132,255,0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg-alt);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background var(--transition-normal), color var(--transition-normal);
        }

        /* ========== HEADER ========== */
        .header {
            padding: 16px 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 24px;
            font-weight: 800;
            text-decoration: none;
            color: var(--text-main);
            transition: transform var(--transition-fast) var(--ease-spring);
        }

        .logo:hover {
            transform: scale(1.02);
        }

        .logo span {
            color: var(--brand-primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 40px;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all var(--transition-fast) var(--ease-spring);
        }

        .theme-toggle:hover {
            transform: scale(1.05);
            background: var(--brand-alpha);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--brand-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all var(--transition-fast) var(--ease-spring);
            overflow: hidden;
        }

        .user-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 0 3px var(--brand-alpha);
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 80px;
        }

        /* Welcome Card with Animation */
        .welcome-card {
            background: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-primary-dark) 100%);
            border-radius: 28px;
            padding: 24px;
            color: white;
            margin-bottom: 24px;
            animation: slideDown 0.5s var(--ease-spring);
            transition: transform var(--transition-normal) var(--ease-spring);
        }

        .welcome-card:hover {
            transform: translateY(-4px);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-card h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .welcome-card p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Quick Actions */
        .quick-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
            animation: fadeIn 0.5s var(--ease-smooth) 0.1s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .quick-action {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 40px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast) var(--ease-spring);
            white-space: nowrap;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }

        .quick-action:hover {
            transform: translateY(-3px) scale(1.02);
            border-color: var(--brand-primary);
            box-shadow: var(--shadow-md);
        }

        .quick-action:active {
            transform: scale(0.98);
        }

        .quick-action.create {
            background: var(--brand-primary);
            color: white;
            border: none;
        }

        .quick-action.create:hover {
            background: var(--brand-primary-dark);
            box-shadow: var(--shadow-hover);
        }

        .quick-action.ai {
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-primary-dark));
            color: white;
            border: none;
        }

        .quick-action.ai:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: var(--shadow-hover);
        }

        /* Section Header */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 24px 0 16px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all var(--transition-fast) var(--ease-spring);
        }

        .refresh-btn:hover {
            background: var(--brand-alpha);
            color: var(--brand-primary);
            transform: rotate(180deg);
        }

        /* Rooms Grid */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            animation: fadeInUp 0.5s var(--ease-smooth);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .room-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            cursor: pointer;
            transition: all var(--transition-normal) var(--ease-spring);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .room-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--brand-primary), var(--state-success));
            opacity: 0;
            transition: opacity var(--transition-normal);
        }

        .room-card:hover {
            transform: translateY(-6px);
            border-color: var(--brand-primary);
            box-shadow: var(--shadow-hover);
        }

        .room-card:hover::before {
            opacity: 1;
        }

        .room-card:active {
            transform: scale(0.98);
        }

        .room-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .room-name {
            font-size: 16px;
            font-weight: 700;
        }

        .room-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--brand-alpha);
            color: var(--brand-primary);
            transition: all var(--transition-fast);
        }

        .room-badge.private {
            background: rgba(255,59,48,0.1);
            color: var(--state-danger);
        }

        .room-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .room-join-btn {
            width: 100%;
            padding: 12px;
            background: var(--brand-primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast) var(--ease-spring);
        }

        .room-join-btn:hover {
            background: var(--brand-primary-dark);
            transform: translateY(-2px);
        }

        /* Show More / Show Less Button */
        .show-more-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 40px;
            padding: 12px 24px;
            margin-top: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast) var(--ease-spring);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            color: var(--text-main);
        }

        .show-more-btn:hover {
            background: var(--brand-alpha);
            border-color: var(--brand-primary);
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border-subtle);
            animation: fadeIn 0.5s var(--ease-smooth);
        }

        /* Bottom Tab Bar */
        .bottom-tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-glass);
            backdrop-filter: blur(40px);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 20px 20px;
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast) var(--ease-spring);
            padding: 8px 16px;
            border-radius: 40px;
        }

        .tab-item i {
            font-size: 24px;
            transition: transform var(--transition-fast) var(--ease-spring);
        }

        .tab-item.active {
            color: var(--brand-primary);
            background: var(--brand-alpha);
        }

        .tab-item:hover i {
            transform: translateY(-2px);
        }

        .tab-item:hover {
            color: var(--brand-primary);
        }

        /* Profile Section */
        .profile-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            animation: fadeInUp 0.5s var(--ease-smooth);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--brand-primary);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: 800;
            cursor: pointer;
            transition: all var(--transition-normal) var(--ease-spring);
        }

        .profile-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 0 4px var(--brand-alpha);
        }

        .profile-field {
            margin-bottom: 20px;
            text-align: left;
        }

        .profile-field label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            display: block;
            margin-bottom: 6px;
        }

        .profile-field input,
        .profile-field textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-alt);
            border: 1px solid var(--border-strong);
            border-radius: 16px;
            font-size: 15px;
            color: var(--text-main);
            transition: all var(--transition-fast);
        }

        .profile-field input:focus,
        .profile-field textarea:focus {
            border-color: var(--brand-primary);
            outline: none;
            box-shadow: 0 0 0 3px var(--brand-alpha);
        }

        .profile-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-normal);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            border-radius: 28px 28px 0 0;
            padding: 24px;
            z-index: 201;
            transform: translateY(100%);
            transition: transform var(--transition-normal) var(--ease-spring);
        }

        .modal.active {
            transform: translateY(0);
        }

        .modal-header {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-base);
            border: 2px solid var(--border-strong);
            border-radius: 20px;
            font-size: 15px;
            color: var(--text-main);
            transition: all var(--transition-fast);
        }

        .form-input:focus {
            border-color: var(--brand-primary);
            outline: none;
            box-shadow: 0 0 0 3px var(--brand-alpha);
        }

        .room-type-selector {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .type-btn {
            flex: 1;
            padding: 12px;
            border-radius: 16px;
            background: var(--bg-base);
            border: 1px solid var(--border-strong);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .type-btn.active {
            background: var(--brand-alpha);
            border-color: var(--brand-primary);
            color: var(--brand-primary);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all var(--transition-fast) var(--ease-spring);
        }

        .btn-primary {
            background: var(--brand-primary);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: var(--brand-primary-dark);
            transform: translateY(-2px);
        }

        .btn-ghost {
            background: var(--bg-base);
            border: 1px solid var(--border-strong);
            color: var(--text-main);
        }

        .btn-ghost:hover {
            background: var(--brand-alpha);
            border-color: var(--brand-primary);
        }

        /* Hide sections */
        .section-page {
            display: none;
        }

        .section-page.active {
            display: block;
        }

        /* Toast */
        .toast-wrapper {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast-item {
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.3s var(--ease-spring);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Pagination Controls */
        .pagination-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
        }

        .page-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .page-btn:hover:not(:disabled) {
            background: var(--brand-alpha);
            border-color: var(--brand-primary);
            transform: translateY(-2px);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .rooms-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .quick-actions {
                gap: 8px;
            }
            .quick-action {
                padding: 10px 16px;
                font-size: 13px;
            }
            .user-name {
                display: none;
            }
            .tab-item {
                padding: 6px 12px;
            }
            .tab-item i {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="toast-wrapper" id="toastWrapper"></div>

    <!-- Header -->
    <div class="header">
        <a href="index.html" class="logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--brand-primary)" stroke-width="1.5">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            MR <span>BOARD</span>
        </a>
        <div class="header-actions">
            <button class="theme-toggle" id="themeToggle">
                <i data-lucide="sun" id="themeIcon"></i>
                <span id="themeText">Light</span>
            </button>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <div class="user-avatar" id="userAvatar" onclick="switchTab('profile')"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Home Section -->
        <div class="section-page active" id="homeSection">
            <div class="welcome-card">
                <h1 id="welcomeMessage">Assalomu alaykum!</h1>
                <p>Birgalikda ishlashni boshlang</p>
            </div>

            <div class="quick-actions">
                <button class="quick-action create" id="quickCreateBtn">
                    <i data-lucide="plus-circle"></i> Yangi xona
                </button>
                <button class="quick-action" id="quickJoinBtn">
                    <i data-lucide="log-in"></i> Kod bilan kirish
                </button>
                <a href="ai.html" class="quick-action ai" style="text-decoration: none;">
                    <i data-lucide="bot"></i> AI Yordamchi
                </a>
            </div>

            <div class="section-header">
                <h2 class="section-title">📋 Barcha xonalar</h2>
                <button class="refresh-btn" id="refreshRoomsBtn">
                    <i data-lucide="refresh-cw"></i>
                </button>
            </div>
            <div id="roomsList" class="rooms-grid">
                <div class="empty-state">Yuklanmoqda...</div>
            </div>
            <div id="roomsPagination" class="pagination-controls" style="display: none;"></div>
        </div>

        <!-- My Rooms Section -->
        <div class="section-page" id="myRoomsSection">
            <div class="section-header">
                <h2 class="section-title">⭐ Mening xonalarim</h2>
                <button class="refresh-btn" id="refreshMyRoomsBtn">
                    <i data-lucide="refresh-cw"></i>
                </button>
            </div>
            <div id="myRoomsList" class="rooms-grid">
                <div class="empty-state">Yuklanmoqda...</div>
            </div>
            <div id="myRoomsPagination" class="pagination-controls" style="display: none;"></div>
        </div>

        <!-- Profile Section -->
        <div class="section-page" id="profileSection">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarInput').click()">
                    <span id="avatarText">U</span>
                </div>
                <input type="file" id="avatarInput" style="display: none;" accept="image/*">
                
                <div class="profile-field">
                    <label>Ism</label>
                    <input type="text" id="profileFullname" placeholder="Ismingiz">
                </div>
                
                <div class="profile-field">
                    <label>Username</label>
                    <input type="text" id="profileUsername" placeholder="username">
                </div>
                
                <div class="profile-field">
                    <label>Email</label>
                    <input type="email" id="profileEmail" disabled>
                </div>
                
                <div class="profile-field">
                    <label>Bio</label>
                    <textarea id="profileBio" rows="3" placeholder="O'zingiz haqingizda..."></textarea>
                </div>
                
                <div class="profile-actions">
                    <button class="btn btn-primary" id="saveProfileBtn">💾 Saqlash</button>
                    <button class="btn btn-ghost" id="logoutBtn">🚪 Chiqish</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Tab Bar -->
    <div class="bottom-tab-bar">
        <button class="tab-item active" data-tab="home">
            <i data-lucide="home"></i>
            <span>Bosh sahifa</span>
        </button>
        <button class="tab-item" data-tab="myrooms">
            <i data-lucide="star"></i>
            <span>Mening xonalar</span>
        </button>
        <button class="tab-item" data-tab="profile">
            <i data-lucide="user"></i>
            <span>Profil</span>
        </button>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modalOverlay"></div>
    
    <div class="modal" id="createRoomModal">
        <div class="modal-header">✨ Yangi xona yaratish</div>
        <div class="form-group">
            <label>Xona nomi</label>
            <input type="text" id="roomNameInput" class="form-input" placeholder="Masalan: Matematika 7-sinf">
        </div>
        <div class="form-group">
            <label>Xona turi</label>
            <div class="room-type-selector">
                <button class="type-btn active" data-type="public">🌍 Public</button>
                <button class="type-btn" data-type="private">🔒 Private</button>
            </div>
        </div>
        <div class="form-group" id="passwordGroup" style="display: none;">
            <label>Parol (ixtiyoriy)</label>
            <input type="password" id="roomPassword" class="form-input" placeholder="Parol qo'yish">
        </div>
        <div class="modal-actions">
            <button class="btn btn-ghost" id="cancelCreateBtn">Bekor</button>
            <button class="btn btn-primary" id="confirmCreateBtn">Yaratish</button>
        </div>
    </div>

    <div class="modal" id="joinRoomModal">
        <div class="modal-header">🔐 Xona kod bilan kirish</div>
        <div class="form-group">
            <label>Xona kodi</label>
            <input type="text" id="joinCodeInput" class="form-input" placeholder="Masalan: ABC123" maxlength="6" style="text-transform: uppercase;">
        </div>
        <div class="form-group" id="joinPasswordGroup" style="display: none;">
            <label>Parol</label>
            <input type="password" id="joinPassword" class="form-input" placeholder="Xona paroli">
        </div>
        <div class="modal-actions">
            <button class="btn btn-ghost" id="cancelJoinBtn">Bekor</button>
            <button class="btn btn-primary" id="confirmJoinBtn">Kirish</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // ========== THEME MANAGEMENT ==========
        function initTheme() {
            const savedTheme = localStorage.getItem('mrboard_theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeUI(savedTheme);
        }

        function updateThemeUI(theme) {
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            if (theme === 'dark') {
                themeIcon.setAttribute('data-lucide', 'moon');
                themeText.textContent = 'Dark';
            } else {
                themeIcon.setAttribute('data-lucide', 'sun');
                themeText.textContent = 'Light';
            }
            lucide.createIcons();
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('mrboard_theme', newTheme);
            updateThemeUI(newTheme);
            showToast(newTheme === 'dark' ? '🌙 Dark mode yoqildi' : '☀️ Light mode yoqildi', 'success');
        }

        document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
        initTheme();

        // ========== FIREBASE CONFIG ==========
        const firebaseConfig = {
            apiKey: "AIzaSyDAsbqgXxl69P-yhOn3L2puTBmLxG70Ao0",
            authDomain: "basic-formula-484419-k8.firebaseapp.com",
            databaseURL: "https://basic-formula-484419-k8-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "basic-formula-484419-k8",
            storageBucket: "basic-formula-484419-k8.firebasestorage.app",
            messagingSenderId: "629679926764",
            appId: "1:629679926764:web:0cff483e9c4752fbd024c9"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let currentAvatar = null;

        // Pagination state
        let publicRooms = [];
        let publicCurrentPage = 1;
        let publicItemsPerPage = 3;

        let myRooms = [];
        let myCurrentPage = 1;
        let myItemsPerPage = 999; // No limit for my rooms

        // ========== TAB SWITCH ==========
        function switchTab(tabId) {
            document.querySelectorAll('.section-page').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(`${tabId}Section`).classList.add('active');
            
            document.querySelectorAll('.tab-item').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
            
            if (tabId === 'home') loadPublicRooms();
            if (tabId === 'myrooms') loadMyRooms();
            if (tabId === 'profile') loadProfile();
        }

        // ========== LOAD PUBLIC ROOMS (with pagination) ==========
        async function loadPublicRooms() {
            const container = document.getElementById('roomsList');
            container.innerHTML = '<div class="empty-state"><i data-lucide="loader" class="spin"></i> Yuklanmoqda...</div>';
            
            try {
                const snapshot = await db.ref('rooms').once('value');
                const rooms = snapshot.val() || {};
                publicRooms = Object.entries(rooms)
                    .filter(([id, room]) => room.isActive !== false && room.isPublic === true)
                    .sort((a, b) => b[1].createdAt - a[1].createdAt)
                    .map(([id, room]) => ({ id, ...room }));
                
                renderPublicRooms();
            } catch(e) {
                container.innerHTML = '<div class="empty-state">❌ Xatolik yuz berdi</div>';
            }
        }

        function renderPublicRooms() {
            const container = document.getElementById('roomsList');
            const paginationContainer = document.getElementById('roomsPagination');
            
            const startIndex = (publicCurrentPage - 1) * publicItemsPerPage;
            const endIndex = startIndex + publicItemsPerPage;
            const paginatedRooms = publicRooms.slice(startIndex, endIndex);
            const totalPages = Math.ceil(publicRooms.length / publicItemsPerPage);
            
            if (publicRooms.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 Hozircha ochiq xonalar yo\'q</div>';
                paginationContainer.style.display = 'none';
                return;
            }
            
            container.innerHTML = paginatedRooms.map(room => `
                <div class="room-card" onclick="joinRoom('${room.id}', ${room.hasPassword})">
                    <div class="room-card-header">
                        <span class="room-name">${escapeHtml(room.name || 'Nomsiz xona')}</span>
                        <span class="room-badge">🌍 Public</span>
                    </div>
                    <div class="room-meta">
                        <span>👤 ${escapeHtml(room.createdByName || 'Foydalanuvchi')}</span>
                        <span>📅 ${new Date(room.createdAt).toLocaleDateString()}</span>
                    </div>
                    <button class="room-join-btn">Kirish →</button>
                </div>
            `).join('');
            
            // Pagination controls
            if (totalPages > 1) {
                paginationContainer.style.display = 'flex';
                paginationContainer.innerHTML = `
                    <button class="page-btn" id="prevPageBtn" ${publicCurrentPage === 1 ? 'disabled' : ''}>
                        <i data-lucide="chevron-left"></i> Oldingi
                    </button>
                    <span class="page-info">${publicCurrentPage} / ${totalPages}</span>
                    <button class="page-btn" id="nextPageBtn" ${publicCurrentPage === totalPages ? 'disabled' : ''}>
                        Keyingi <i data-lucide="chevron-right"></i>
                    </button>
                `;
                
                document.getElementById('prevPageBtn')?.addEventListener('click', () => {
                    if (publicCurrentPage > 1) {
                        publicCurrentPage--;
                        renderPublicRooms();
                    }
                });
                document.getElementById('nextPageBtn')?.addEventListener('click', () => {
                    if (publicCurrentPage < totalPages) {
                        publicCurrentPage++;
                        renderPublicRooms();
                    }
                });
            } else {
                paginationContainer.style.display = 'none';
            }
            
            lucide.createIcons();
        }

        // ========== LOAD MY ROOMS (no limit - all rooms) ==========
        async function loadMyRooms() {
            if (!currentUser) return;
            const container = document.getElementById('myRoomsList');
            container.innerHTML = '<div class="empty-state"><i data-lucide="loader" class="spin"></i> Yuklanmoqda...</div>';
            
            try {
                const snapshot = await db.ref('rooms').orderByChild('createdBy').equalTo(currentUser.uid).once('value');
                const rooms = snapshot.val() || {};
                myRooms = Object.entries(rooms)
                    .filter(([id, room]) => room.isActive !== false)
                    .sort((a, b) => b[1].createdAt - a[1].createdAt)
                    .map(([id, room]) => ({ id, ...room }));
                
                renderMyRooms();
            } catch(e) {
                container.innerHTML = '<div class="empty-state">❌ Xatolik</div>';
            }
        }

        function renderMyRooms() {
            const container = document.getElementById('myRoomsList');
            const paginationContainer = document.getElementById('myRoomsPagination');
            
            if (myRooms.length === 0) {
                container.innerHTML = '<div class="empty-state">⭐ Siz hali xona yaratmagansiz<br><button class="quick-action create" id="emptyCreateBtn" style="margin-top: 16px;"><i data-lucide="plus-circle"></i> Birinchi xonani yarating</button></div>';
                paginationContainer.style.display = 'none';
                document.getElementById('emptyCreateBtn')?.addEventListener('click', openCreateModal);
                lucide.createIcons();
                return;
            }
            
            // Show ALL rooms (no pagination for my rooms)
            container.innerHTML = myRooms.map(room => `
                <div class="room-card" onclick="goToRoom('${room.id}')">
                    <div class="room-card-header">
                        <span class="room-name">${escapeHtml(room.name || 'Nomsiz xona')}</span>
                        <span class="room-badge ${room.isPublic ? '' : 'private'}">${room.isPublic ? '🌍 Public' : '🔒 Private'}</span>
                    </div>
                    <div class="room-meta">
                        <span>👥 ${room.users ? Object.keys(room.users).length : 0} kishi</span>
                        <span>📅 ${new Date(room.createdAt).toLocaleDateString()}</span>
                    </div>
                    <button class="room-join-btn">Davom ettirish →</button>
                </div>
            `).join('');
            
            paginationContainer.style.display = 'none';
            lucide.createIcons();
        }

        function joinRoom(roomId, hasPassword) {
            if (hasPassword) {
                document.getElementById('joinCodeInput').value = roomId;
                document.getElementById('joinPasswordGroup').style.display = 'block';
                document.getElementById('joinRoomModal').classList.add('active');
                document.getElementById('modalOverlay').classList.add('active');
            } else {
                goToRoom(roomId);
            }
        }

        function goToRoom(roomId) {
            localStorage.setItem('lastRoomId', roomId);
            window.location.href = `board.html?room=${roomId}`;
        }

        // ========== PROFILE ==========
        async function loadProfile() {
            if (!currentUser) return;
            const snapshot = await db.ref(`users/${currentUser.uid}`).once('value');
            const data = snapshot.val() || {};
            
            document.getElementById('profileFullname').value = data.fullName || currentUser.displayName || '';
            document.getElementById('profileUsername').value = data.username || currentUser.email?.split('@')[0] || '';
            document.getElementById('profileEmail').value = currentUser.email || '';
            document.getElementById('profileBio').value = data.bio || '';
            
            currentAvatar = data.avatarBase64 || null;
            updateAvatarUI(currentAvatar, data.fullName || currentUser.displayName);
        }

        function updateAvatarUI(avatar, name) {
            const avatarDiv = document.getElementById('userAvatar');
            const profileAvatar = document.getElementById('profileAvatar');
            const letter = (name || 'U').charAt(0).toUpperCase();
            
            if (avatar && avatar.startsWith('data:image')) {
                avatarDiv.style.backgroundImage = `url(${avatar})`;
                avatarDiv.style.backgroundSize = 'cover';
                avatarDiv.innerHTML = '';
                if (profileAvatar) {
                    profileAvatar.style.backgroundImage = `url(${avatar})`;
                    profileAvatar.style.backgroundSize = 'cover';
                    profileAvatar.innerHTML = '';
                }
            } else {
                avatarDiv.style.backgroundImage = 'none';
                avatarDiv.style.backgroundColor = 'var(--brand-primary)';
                avatarDiv.innerHTML = letter;
                if (profileAvatar) {
                    profileAvatar.style.backgroundImage = 'none';
                    profileAvatar.style.backgroundColor = 'var(--brand-primary)';
                    profileAvatar.innerHTML = `<span id="avatarText">${letter}</span>`;
                }
            }
        }

        async function saveProfile() {
            if (!currentUser) return;
            const fullName = document.getElementById('profileFullname').value.trim();
            const username = document.getElementById('profileUsername').value.trim();
            const bio = document.getElementById('profileBio').value.trim();
            
            const updateData = { fullName, username, bio, updatedAt: Date.now() };
            if (currentAvatar) updateData.avatarBase64 = currentAvatar;
            
            await db.ref(`users/${currentUser.uid}`).update(updateData);
            if (fullName) await currentUser.updateProfile({ displayName: fullName });
            showToast('✅ Profil saqlandi!', 'success');
            loadProfile();
        }

        document.getElementById('avatarInput')?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                currentAvatar = ev.target.result;
                updateAvatarUI(currentAvatar, document.getElementById('profileFullname').value);
                showToast('Avatar yangilandi. Saqlash tugmasini bosing!', 'success');
            };
            reader.readAsDataURL(file);
        });

        // ========== CREATE ROOM ==========
        let roomType = 'public';
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                roomType = btn.dataset.type;
                document.getElementById('passwordGroup').style.display = roomType === 'private' ? 'block' : 'none';
            };
        });

        async function createRoom() {
            const name = document.getElementById('roomNameInput').value.trim();
            if (!name) { showToast('Xona nomini kiriting!', 'error'); return; }
            const password = document.getElementById('roomPassword').value;
            const roomCode = Math.random().toString(36).substr(2, 6).toUpperCase();
            const teacherSecret = Math.random().toString(36).substr(2, 16);
            
            await db.ref(`rooms/${roomCode}`).set({
                name, createdBy: currentUser.uid,
                createdByName: currentUser.displayName || currentUser.email?.split('@')[0],
                createdAt: Date.now(), isPublic: roomType === 'public',
                hasPassword: roomType === 'private' && password ? true : false,
                password: roomType === 'private' ? password || null : null,
                isActive: true, teacherSecret, elements: {}
            });
            
            closeModals();
            showToast(`✅ "${name}" xonasi yaratildi! Kod: ${roomCode}`, 'success');
            loadMyRooms();
            setTimeout(() => goToRoom(roomCode), 1000);
        }

        // ========== JOIN ROOM ==========
        async function confirmJoin() {
            const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
            if (!code) { showToast('Xona kodini kiriting!', 'error'); return; }
            const password = document.getElementById('joinPassword').value;
            
            const snapshot = await db.ref(`rooms/${code}`).once('value');
            const room = snapshot.val();
            if (!room) { showToast('Xona topilmadi!', 'error'); return; }
            if (room.hasPassword && room.password !== password) {
                showToast('Parol noto\'g\'ri!', 'error');
                return;
            }
            closeModals();
            goToRoom(code);
        }

        // ========== MODALS ==========
        function openCreateModal() {
            document.getElementById('roomNameInput').value = '';
            document.getElementById('roomPassword').value = '';
            document.getElementById('passwordGroup').style.display = 'none';
            document.querySelector('.type-btn.active')?.classList.remove('active');
            document.querySelector('.type-btn[data-type="public"]')?.classList.add('active');
            roomType = 'public';
            document.getElementById('createRoomModal').classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
        }
        
        function openJoinModal() {
            document.getElementById('joinCodeInput').value = '';
            document.getElementById('joinPassword').value = '';
            document.getElementById('joinPasswordGroup').style.display = 'none';
            document.getElementById('joinRoomModal').classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
        }
        
        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById('modalOverlay').classList.remove('active');
        }

        // ========== TOAST ==========
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toastWrapper');
            const toast = document.createElement('div');
            toast.className = `toast-item`;
            toast.innerHTML = `<span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        // ========== AUTH ==========
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const snapshot = await db.ref(`users/${user.uid}`).once('value');
                const data = snapshot.val() || {};
                const name = data.fullName || user.displayName || user.email?.split('@')[0] || 'User';
                document.getElementById('userName').textContent = name;
                document.getElementById('welcomeMessage').textContent = `Assalomu alaykum, ${name}!`;
                document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
                loadPublicRooms();
                loadMyRooms();
                loadProfile();
                lucide.createIcons();
            } else {
                window.location.href = 'board.html';
            }
        });

        // ========== EVENT LISTENERS ==========
        document.getElementById('quickCreateBtn')?.addEventListener('click', openCreateModal);
        document.getElementById('quickJoinBtn')?.addEventListener('click', openJoinModal);
        document.getElementById('cancelCreateBtn')?.addEventListener('click', closeModals);
        document.getElementById('confirmCreateBtn')?.addEventListener('click', createRoom);
        document.getElementById('cancelJoinBtn')?.addEventListener('click', closeModals);
        document.getElementById('confirmJoinBtn')?.addEventListener('click', confirmJoin);
        document.getElementById('refreshRoomsBtn')?.addEventListener('click', () => {
            publicCurrentPage = 1;
            loadPublicRooms();
        });
        document.getElementById('refreshMyRoomsBtn')?.addEventListener('click', loadMyRooms);
        document.getElementById('saveProfileBtn')?.addEventListener('click', saveProfile);
        document.getElementById('logoutBtn')?.addEventListener('click', () => auth.signOut());
        document.getElementById('modalOverlay')?.addEventListener('click', closeModals);
        
        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });

        window.joinRoom = joinRoom;
        window.goToRoom = goToRoom;
        window.switchTab = switchTab;
    </script>
</body>
</html>
