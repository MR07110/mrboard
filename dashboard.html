<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MR BOARD · Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        /* Asosiy stillar */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-base: #ffffff;
            --bg-alt: #f8fafc;
            --bg-glass: rgba(255,255,255,0.7);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --brand-primary: #007aff;
            --border-subtle: #e2e8f0;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-alt); color: var(--text-main); overflow: hidden; height: 100vh; }

        /* Header */
        .header {
            height: 60px; background: var(--bg-glass); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 1px solid var(--border-subtle);
            position: fixed; top: 0; width: 100%; z-index: 100;
        }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        
        /* Main Content Area */
        main { margin-top: 60px; height: calc(100vh - 130px); overflow-y: auto; padding: 20px; }

        /* Tab Panes */
        .tab-pane { display: none; width: 100%; height: 100%; }
        .tab-pane.active { display: block; }
        
        iframe { width: 100%; height: 100%; border: none; }

        /* Home Content Stili (Xonalar) */
        .home-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .room-card { 
            background: white; padding: 16px; border-radius: 16px; 
            border: 1px solid var(--border-subtle); transition: 0.2s; cursor: pointer;
        }
        .room-card:active { transform: scale(0.98); }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--bg-glass); backdrop-filter: blur(15px);
            border-top: 1px solid var(--border-subtle);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom); z-index: 100;
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; 
            color: var(--text-muted); text-decoration: none; font-size: 0.7rem; font-weight: 500;
            background: none; border: none; cursor: pointer; transition: 0.2s;
        }
        .nav-item i { margin-bottom: 4px; transition: 0.2s; }
        .nav-item.active { color: var(--brand-primary); }
        .nav-item.active i { transform: translateY(-2px); }

        /* Modal (New Board uchun) */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
            display: none; align-items: center; justify-content: center; z-index: 1000; 
        }
        .modal-content { background: white; padding: 24px; border-radius: 24px; width: 90%; max-width: 400px; }
        .btn-primary { 
            background: var(--brand-primary); color: white; border: none; 
            padding: 12px 24px; border-radius: 12px; font-weight: 600; width: 100%; margin-top: 10px;
        }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border-subtle); border-radius: 10px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo"><i data-lucide="layers"></i> MR BOARD</div>
        <div id="userSmallAvatar" style="width: 35px; height: 35px; border-radius: 50%; background: #eee; overflow: hidden;"></div>
    </header>

    <main>
        <div id="tab-home" class="tab-pane active">
            <div class="home-header">
                <h2>Barcha xonalar</h2>
                <button onclick="document.getElementById('newBoardModal').style.display='flex'" style="background:none; border:none; color:var(--brand-primary); font-weight:600; display:flex; align-items:center; gap:5px;">
                    <i data-lucide="plus-circle"></i> New Board
                </button>
            </div>
            <div id="publicRooms" class="rooms-grid">
                <p style="color:var(--text-muted)">Yuklanmoqda...</p>
            </div>
        </div>

        <div id="tab-iframe" class="tab-pane">
            <iframe id="contentFrame" src=""></iframe>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home')" id="btn-home">
            <i data-lucide="home"></i> Home
        </button>
        <button class="nav-item" onclick="switchTab('rooms')" id="btn-rooms">
            <i data-lucide="layout"></i> My Boards
        </button>
        <button class="nav-item" onclick="switchTab('profile')" id="btn-profile">
            <i data-lucide="user"></i> Profile
        </button>
    </nav>

    <div class="modal" id="newBoardModal">
        <div class="modal-content">
            <h3 style="margin-bottom:15px">Yangi xona ochish</h3>
            <input type="text" id="boardName" placeholder="Xona nomi...">
            <button class="btn-primary" onclick="createNewBoard()">Yaratish</button>
            <button onclick="document.getElementById('newBoardModal').style.display='none'" style="width:100%; background:none; border:none; margin-top:10px; color:var(--text-muted)">Bekor qilish</button>
        </div>
    </div>

    <script>
        // Firebase Config (O'zingiznikini qo'ying)
        const firebaseConfig = { /* CONFIG */ };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let currentUser = null;

        // TAB ALMASHTIRISH MANTIQI
        function switchTab(target) {
            const homeTab = document.getElementById('tab-home');
            const iframeTab = document.getElementById('tab-iframe');
            const iframe = document.getElementById('contentFrame');

            // Navigatsiya tugmalarini yangilash
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + target).classList.add('active');

            if (target === 'home') {
                homeTab.classList.add('active');
                iframeTab.classList.remove('active');
                iframe.src = ""; // Iframe-ni tozalash
                loadPublicRooms();
            } else {
                homeTab.classList.remove('active');
                iframeTab.classList.add('active');
                
                // Qaysi sahifani yuklashni aniqlash
                if (target === 'profile') iframe.src = "profile.html";
                if (target === 'rooms') iframe.src = "rooms.html";
            }
        }

        // XONALARNI YUKLASH (HOME)
        function loadPublicRooms() {
            const container = document.getElementById('publicRooms');
            db.ref('rooms').limitToLast(20).once('value', snapshot => {
                container.innerHTML = "";
                if (!snapshot.exists()) {
                    container.innerHTML = "<p>Xonalar mavjud emas.</p>";
                    return;
                }
                snapshot.forEach(child => {
                    const room = child.val();
                    const card = document.createElement('div');
                    card.className = 'room-card';
                    card.innerHTML = `
                        <h4 style="margin-bottom:5px">${room.name}</h4>
                        <p style="font-size:0.8rem; color:var(--text-muted)">Ega: ${room.creatorName || 'Noma'lum'}</p>
                    `;
                    card.onclick = () => window.location.href = `board.html?id=${child.key}`;
                    container.appendChild(card);
                });
            });
        }

        // YANGI XONA OCHISH
        function createNewBoard() {
            const name = document.getElementById('boardName').value;
            if (!name || !currentUser) return;

            const newRoomRef = db.ref('rooms').push();
            newRoomRef.set({
                name: name,
                creatorId: currentUser.uid,
                creatorName: currentUser.displayName || "User",
                createdAt: Date.now()
            }).then(() => {
                document.getElementById('newBoardModal').style.display = 'none';
                document.getElementById('boardName').value = "";
                loadPublicRooms();
            });
        }

        // AUTH HOLATI
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                loadPublicRooms();
                lucide.createIcons();
            } else {
                window.location.href = 'board.html';
            }
        });

        // IFRAME-DAN XABARLARNI QABUL QILISH
        window.addEventListener('message', (e) => {
            if (e.data === 'profileUpdated') {
                // Profil o'zgarganda home dagi ba'zi ma'lumotlarni yangilash mumkin
            }
        });
    </script>
</body>
</html>
