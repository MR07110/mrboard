<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR BOARD | Live Reels</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* CSS QISMI */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: white; overflow: hidden; }

        /* Header & Search */
        .header {
            height: 70px;
            padding: 0 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: fixed; top: 0; width: 100%; z-index: 100;
        }

        .search-box {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 8px 15px;
            width: 300px;
        }

        .search-box input {
            background: none; border: none; color: white;
            margin-left: 10px; width: 100%; outline: none;
        }

        /* Reels Container */
        .reels-wrapper {
            height: 100vh;
            padding-top: 70px;
            overflow: hidden;
        }

        .reels-feed {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .reels-feed::-webkit-scrollbar { display: none; }

        /* Reel Card Design (70/30) */
        .reel-card {
            height: calc(100vh - 70px);
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 70% Doska Preview */
        .preview-area {
            height: 70%;
            background: #ffffff;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .preview-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 30% Info Area */
        .info-area {
            height: 30%;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid #007aff;
        }

        .room-meta h2 { font-size: 24px; margin-bottom: 10px; color: #f8fafc; }

        .profile-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .profile-btn:hover { background: rgba(0,122,255,0.2); }

        .avatar {
            width: 45px; height: 45px;
            background: #007aff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .actions { display: flex; flex-direction: column; gap: 15px; }
        .btn-circle {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-circle:hover { background: #007aff; transform: scale(1.1); }

        /* Loader */
        .loader { text-align: center; padding: 20px; color: #64748b; }
        .spin { animation: rotate 1s linear infinite; }
        @keyframes rotate { from {transform: rotate(0deg)} to {transform: rotate(360deg)} }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 20px;">MR <span style="color:#007aff">BOARD</span></h1>
        <div class="search-box">
            <i data-lucide="search" style="width:18px"></i>
            <input type="text" id="searchInput" placeholder="Xona qidirish..." oninput="handleSearch(this.value)">
        </div>
    </div>

    <div class="reels-wrapper">
        <div id="reels-feed" class="reels-feed">
            <div class="loader"><i data-lucide="loader" class="spin"></i></div>
        </div>
    </div>

    <script>
        // JS QISMI (Firebase Config)
        const firebaseConfig = {
            // O'zingizni API kalitlarni shu yerga qo'ying
            databaseURL: "YOUR_FIREBASE_DB_URL",
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const reelsFeed = document.getElementById('reels-feed');
        let activeListeners = {}; // RAM xotirasini tejash uchun

        // 1. Karta yaratish funksiyasi
        function createReel(id, data) {
            const section = document.createElement('section');
            section.className = 'reel-card';
            section.dataset.roomId = id;

            section.innerHTML = `
                <div class="preview-area" onclick="location.href='board.html?id=${id}'">
                    <canvas id="canvas-${id}" class="preview-canvas"></canvas>
                </div>
                <div class="info-area">
                    <div class="room-meta">
                        <h2>${data.name || 'Nomsiz Doska'}</h2>
                        <div class="profile-btn" onclick="openProfile('${data.ownerId}')">
                            <div class="avatar">${(data.ownerName || 'U').charAt(0)}</div>
                            <span>@${data.ownerName || 'foydalanuvchi'}</span>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-circle"><i data-lucide="heart"></i></button>
                        <button class="btn-circle"><i data-lucide="share-2"></i></button>
                    </div>
                </div>
            `;
            lucide.createIcons();
            return section;
        }

        // 2. Intersection Observer: Faqat ko'rinayotgan xonani yuklash
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const id = entry.target.dataset.roomId;
                if (entry.isIntersecting) {
                    startLivePreview(id);
                } else {
                    stopLivePreview(id);
                }
            });
        }, { threshold: 0.6 });

        // 3. Firebase'dan faqat kerakli xonaga ulanish
        function startLivePreview(id) {
            if (activeListeners[id]) return;
            const canvas = document.getElementById(`canvas-${id}`);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            console.log("Ulanmoqda:", id);
            activeListeners[id] = db.ref(`drawings/${id}`).on('value', snap => {
                const points = snap.val();
                if (points) drawOnCanvas(ctx, points, canvas);
            });
        }

        function stopLivePreview(id) {
            if (activeListeners[id]) {
                db.ref(`drawings/${id}`).off('value');
                delete activeListeners[id];
                console.log("Uzildi:", id);
            }
        }

        // Canvasga chizish (Simple render)
        function drawOnCanvas(ctx, points, canvas) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineCap = 'round'; ctx.lineWidth = 2;
            Object.values(points).forEach(p => {
                ctx.strokeStyle = p.color || '#000';
                ctx.beginPath(); ctx.moveTo(p.x1, p.y1); ctx.lineTo(p.x2, p.y2); ctx.stroke();
            });
        }

        // 4. Qidiruv va Yuklash
        function loadRooms() {
            reelsFeed.innerHTML = '';
            db.ref('public_rooms').limitToLast(10).once('value', snap => {
                snap.forEach(child => {
                    const el = createReel(child.key, child.val());
                    reelsFeed.appendChild(el);
                    observer.observe(el);
                });
            });
        }

        let searchTimer;
        function handleSearch(val) {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                reelsFeed.innerHTML = '<div class="loader"><i data-lucide="loader" class="spin"></i></div>';
                db.ref('public_rooms').orderByChild('name').startAt(val).endAt(val + '\uf8ff')
                  .limitToFirst(5).once('value', snap => {
                      reelsFeed.innerHTML = '';
                      snap.forEach(child => {
                          const el = createReel(child.key, child.val());
                          reelsFeed.appendChild(el);
                          observer.observe(el);
                      });
                  });
            }, 600);
        }

        function openProfile(uid) { alert("Profil ID: " + uid); }

        // Start
        loadRooms();
    </script>
</body>
</html>
