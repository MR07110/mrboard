<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MR BOARD | Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: #0f172a;
            color: #f8fafc;
            overflow: hidden;
        }

        /* ========== HEADER ========== */
        .dashboard-header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 800;
            text-decoration: none;
            color: white;
        }

        .logo svg {
            width: 28px;
            height: 28px;
        }

        .logo span {
            color: #007aff;
        }

        .search-box {
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            display: flex;
            align-items: center;
            padding: 8px 18px;
            width: 280px;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .search-box input {
            background: none;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            font-size: 14px;
        }

        .search-box input::placeholder {
            color: #94a3b8;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #007aff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        .user-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.3);
        }

        .btn-logout {
            background: rgba(255, 59, 48, 0.15);
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #ff6b6b;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: rgba(255, 59, 48, 0.3);
            transform: scale(1.02);
        }

        /* ========== REELS FEED ========== */
        .reels-wrapper {
            height: calc(100vh - 70px);
            overflow: hidden;
        }

        .reels-feed {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }

        .reels-feed::-webkit-scrollbar {
            display: none;
        }

        /* Reel Card */
        .reel-card {
            height: calc(100vh - 70px);
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 70% Doska Preview */
        .preview-area {
            height: 70%;
            background: #ffffff;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border-radius: 0 0 24px 24px;
        }

        .preview-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 30% Info Area */
        .info-area {
            height: 30%;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid #007aff;
        }

        .room-meta h2 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #f8fafc;
        }

        .room-meta p {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .profile-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(255,255,255,0.05);
            transition: 0.2s;
            width: fit-content;
        }

        .profile-btn:hover {
            background: rgba(0,122,255,0.2);
        }

        .avatar-sm {
            width: 40px;
            height: 40px;
            background: #007aff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-circle:hover {
            background: #007aff;
            transform: scale(1.1);
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .spin {
            animation: rotate 1s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ========== PROFILE MODAL ========== */
        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .profile-modal.is-visible {
            visibility: visible;
            opacity: 1;
        }

        .profile-modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            cursor: pointer;
        }

        .profile-modal-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid rgba(0,122,255,0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .profile-modal.is-visible .profile-modal-container {
            transform: scale(1);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: #007aff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            margin: 0 auto 16px;
            border: 3px solid #007aff;
        }

        .profile-header h3 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .profile-header p {
            color: #94a3b8;
            font-size: 14px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            margin: 24px 0;
            padding: 16px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: #007aff;
        }

        .stat-label {
            font-size: 12px;
            color: #94a3b8;
        }

        .profile-rooms {
            margin-top: 20px;
        }

        .profile-rooms h4 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #f8fafc;
        }

        .profile-room-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .profile-room-item {
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .profile-room-item:hover {
            background: rgba(0,122,255,0.2);
        }

        .profile-room-name {
            font-weight: 600;
            font-size: 14px;
        }

        .profile-room-date {
            font-size: 10px;
            color: #94a3b8;
        }

        /* ========== FLOATING DONATE BUTTON ========== */
        .floating-donate {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            cursor: pointer;
            animation: floatPulse 2s ease-in-out infinite;
        }

        .donate-float-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #007aff, #0056b3);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.4);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .donate-float-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 32px rgba(0, 122, 255, 0.6);
        }

        .donate-float-btn svg {
            width: 32px;
            height: 32px;
            animation: heartbeat 1.2s ease-in-out infinite;
        }

        @keyframes floatPulse {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* ========== DONATE MODAL (FAQAT KARTA) ========== */
        .donate-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .donate-modal.is-visible {
            visibility: visible;
            opacity: 1;
        }

        .donate-modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            cursor: pointer;
        }

        .donate-modal-container.card-only {
            position: relative;
            width: auto;
            background: transparent;
            box-shadow: none;
            padding: 0;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .donate-modal.is-visible .donate-modal-container.card-only {
            transform: scale(1);
        }

        /* 3D Karta */
        .card-3d-container {
            width: 450px;
            height: 284px;
            transform-style: preserve-3d;
            animation: autoRotateCard 8s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes autoRotateCard {
            0% { transform: rotateY(-15deg) rotateX(10deg); }
            50% { transform: rotateY(15deg) rotateX(-10deg); }
            100% { transform: rotateY(-15deg) rotateX(10deg); }
        }

        .card-3d {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #007aff, #0056b3);
            border-radius: 20px;
            padding: 25px;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card-shine {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(110deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
            animation: moveShine 4s linear infinite;
            pointer-events: none;
        }

        @keyframes moveShine {
            0% { transform: translateX(-150%); }
            100% { transform: translateX(150%); }
        }

        .card-watermark {
            position: absolute;
            top: -40px;
            right: -20px;
            font-family: "Times New Roman", Times, serif;
            font-size: 220px;
            font-weight: 900;
            font-style: italic;
            color: rgba(255, 255, 255, 0.08);
            letter-spacing: -12px;
            pointer-events: none;
        }

        .card-bank-name {
            font-family: Arial, sans-serif;
            font-size: 24px;
            font-weight: 800;
        }

        .card-chip-area {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
        }

        .card-chip {
            width: 58px;
            height: 42px;
            background: linear-gradient(135deg, #f1c40f, #d4af37, #f1c40f);
            border-radius: 8px;
            border: 0.5px solid rgba(0,0,0,0.2);
        }

        .card-contactless {
            transform: rotate(90deg);
            font-size: 20px;
            color: rgba(255,255,255,0.5);
            font-family: sans-serif;
        }

        .card-number {
            font-family: 'Courier New', Courier, monospace;
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .card-holder-name {
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-expiry-box {
            text-align: center;
            margin-right: 30px;
        }

        .expiry-label {
            display: block;
            font-size: 7px;
            font-family: Arial;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .expiry-date {
            font-size: 16px;
            font-weight: bold;
        }

        .card-visa-logo {
            font-family: "Times New Roman", Times, serif;
            font-size: 42px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -2px;
            line-height: 0.8;
        }

        @media (max-width: 768px) {
            .search-box {
                width: 180px;
                padding: 6px 12px;
            }
            .room-meta h2 {
                font-size: 18px;
            }
            .btn-circle {
                width: 40px;
                height: 40px;
            }
            .card-3d-container {
                width: 320px;
                height: 202px;
            }
            .card-bank-name {
                font-size: 18px;
            }
            .card-number {
                font-size: 18px;
                letter-spacing: 1px;
            }
            .card-holder-name {
                font-size: 11px;
            }
            .card-visa-logo {
                font-size: 28px;
            }
            .floating-donate {
                bottom: 16px;
                right: 16px;
            }
            .donate-float-btn {
                width: 52px;
                height: 52px;
            }
        }
    </style>
</head>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyDAsbqgXxl69P-yhOn3L2puTBmLxG70Ao0",
            authDomain: "basic-formula-484419-k8.firebaseapp.com",
            databaseURL: "https://basic-formula-484419-k8-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "basic-formula-484419-k8",
            storageBucket: "basic-formula-484419-k8.firebasestorage.app",
            messagingSenderId: "629679926764",
            appId: "1:629679926764:web:0cff483e9c4752fbd024c9"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let activeListeners = {};
        let allRooms = [];

        // Intersection Observer
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const id = entry.target.dataset.roomId;
                if (entry.isIntersecting) {
                    startLivePreview(id);
                } else {
                    stopLivePreview(id);
                }
            });
        }, { threshold: 0.5 });

        function startLivePreview(id) {
            if (activeListeners[id]) return;
            const canvas = document.getElementById(`canvas-${id}`);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            // Set canvas size
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            
            activeListeners[id] = db.ref(`rooms/${id}/elements`).on('value', snap => {
                const elements = snap.val();
                if (elements) drawOnCanvas(ctx, elements, canvas);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            });
        }

        function stopLivePreview(id) {
            if (activeListeners[id]) {
                db.ref(`rooms/${id}/elements`).off('value');
                delete activeListeners[id];
            }
        }

        function drawOnCanvas(ctx, elements, canvas) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!elements) return;
            
            Object.values(elements).forEach(el => {
                if (el.type === 'path' && el.p) {
                    ctx.beginPath();
                    ctx.strokeStyle = el.c || '#000';
                    ctx.lineWidth = el.s || 2;
                    ctx.lineCap = 'round';
                    ctx.moveTo(el.p[0].x, el.p[0].y);
                    for (let i = 1; i < el.p.length; i++) {
                        ctx.lineTo(el.p[i].x, el.p[i].y);
                    }
                    ctx.stroke();
                } else if (el.type === 'shape' && el.p1 && el.p2) {
                    ctx.beginPath();
                    ctx.strokeStyle = el.c || '#000';
                    ctx.lineWidth = el.s || 2;
                    if (el.tl === 'rect') {
                        ctx.rect(el.p1.x, el.p1.y, el.p2.x - el.p1.x, el.p2.y - el.p1.y);
                    } else if (el.tl === 'circle') {
                        const r = Math.hypot(el.p2.x - el.p1.x, el.p2.y - el.p1.y);
                        ctx.arc(el.p1.x, el.p1.y, r, 0, Math.PI * 2);
                    } else {
                        ctx.moveTo(el.p1.x, el.p1.y);
                        ctx.lineTo(el.p2.x, el.p2.y);
                    }
                    ctx.stroke();
                }
            });
        }

        function createReel(id, data) {
            const section = document.createElement('section');
            section.className = 'reel-card';
            section.dataset.roomId = id;

            section.innerHTML = `
                <div class="preview-area" onclick="location.href='board.html?room=${id}'">
                    <canvas id="canvas-${id}" class="preview-canvas"></canvas>
                </div>
                <div class="info-area">
                    <div class="room-meta">
                        <h2>${data.name || 'Nomsiz xona'}</h2>
                        <div class="profile-btn" onclick="event.stopPropagation(); openProfileById('${data.createdBy || ''}', '${data.createdByName || 'Foydalanuvchi'}')">
                            <div class="avatar-sm">${(data.createdByName || 'U').charAt(0).toUpperCase()}</div>
                            <span>${data.createdByName || 'Foydalanuvchi'}</span>
                        </div>
                        <p>👥 ${data.userCount || 0} ishtirokchi</p>
                    </div>
                    <div class="actions">
                        <button class="btn-circle" onclick="event.stopPropagation(); likeRoom('${id}')">
                            <i data-lucide="heart"></i>
                        </button>
                        <button class="btn-circle" onclick="event.stopPropagation(); shareRoom('${id}')">
                            <i data-lucide="share-2"></i>
                        </button>
                    </div>
                </div>
            `;
            lucide.createIcons();
            
            setTimeout(() => {
                const canvas = document.getElementById(`canvas-${id}`);
                if (canvas) {
                    canvas.width = canvas.clientWidth;
                    canvas.height = canvas.clientHeight;
                }
            }, 100);
            
            return section;
        }

        function loadRooms(searchTerm = '') {
            const feed = document.getElementById('reels-feed');
            feed.innerHTML = '<div class="loader"><i data-lucide="loader" class="spin"></i> Yuklanmoqda...</div>';
            
            let query = db.ref('rooms');
            if (searchTerm) {
                query = db.ref('rooms').orderByChild('name').startAt(searchTerm).endAt(searchTerm + '\uf8ff');
            }
            
            query.limitToLast(20).once('value', snap => {
                feed.innerHTML = '';
                const rooms = [];
                snap.forEach(child => {
                    const room = child.val();
                    if (room.isActive !== false) {
                        rooms.push({ id: child.key, ...room });
                    }
                });
                rooms.reverse().forEach(room => {
                    const el = createReel(room.id, room);
                    feed.appendChild(el);
                    observer.observe(el);
                });
                if (rooms.length === 0) {
                    feed.innerHTML = '<div class="loader">📭 Hech qanday xona topilmadi</div>';
                }
            });
        }

        let searchTimer;
        function handleSearch(val) {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                loadRooms(val);
            }, 500);
        }

        function likeRoom(id) {
            alert('❤️ Xona like qilindi!');
        }

        function shareRoom(id) {
            navigator.clipboard.writeText(window.location.origin + '/board.html?room=' + id);
            alert('🔗 Link nusxalandi!');
        }

        function openProfileById(uid, name) {
            document.getElementById('profileAvatar').textContent = name.charAt(0).toUpperCase();
            document.getElementById('profileName').textContent = name;
            document.getElementById('profileEmail').textContent = uid + '@mrboard.uz';
            document.getElementById('profileModal').classList.add('is-visible');
        }

        function openProfileModal() {
            if (currentUser) {
                document.getElementById('profileAvatar').textContent = (currentUser.displayName || currentUser.email.charAt(0)).toUpperCase();
                document.getElementById('profileName').textContent = currentUser.displayName || currentUser.email.split('@')[0];
                document.getElementById('profileEmail').textContent = currentUser.email;
                document.getElementById('profileModal').classList.add('is-visible');
            }
        }

        // Donate modal
        const floatingBtn = document.getElementById('floatingDonateBtn');
        const donateModal = document.getElementById('donateModal');
        const donateClose = document.getElementById('donateModalClose');
        if (floatingBtn) floatingBtn.addEventListener('click', () => donateModal.classList.add('is-visible'));
        if (donateClose) donateClose.addEventListener('click', () => donateModal.classList.remove('is-visible'));
        if (donateModal) donateModal.addEventListener('click', e => { if (e.target === donateModal) donateModal.classList.remove('is-visible'); });

        // Profile modal close
        const profileModal = document.getElementById('profileModal');
        const profileClose = document.getElementById('profileModalClose');
        if (profileClose) profileClose.addEventListener('click', () => profileModal.classList.remove('is-visible'));
        if (profileModal) profileModal.addEventListener('click', e => { if (e.target === profileModal) profileModal.classList.remove('is-visible'); });

        // Auth
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('user-name').textContent = user.displayName || user.email.split('@')[0];
                document.getElementById('user-avatar').textContent = (user.displayName || user.email.charAt(0)).toUpperCase();
                loadRooms();
            } else {
                window.location.href = 'board.html';
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => auth.signOut());
        lucide.createIcons();
    </script>
</body>
</html>
