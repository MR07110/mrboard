<!DOCTYPE html>
<html lang="uz" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MR BOARD - Part 5 (Lazer Asbobi)</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #ffffff;
            --bg-canvas: #f8fafc;
            --bg-glass: rgba(255,255,255,0.7);
            --bg-panel: rgba(255,255,255,0.9);
            --bg-hover: rgba(0,0,0,0.03);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-subtle: rgba(255,255,255,0.4);
            --border-strong: rgba(0,0,0,0.08);
            --brand-primary: #007aff;
            --brand-alpha: rgba(0,122,255,0.1);
            --state-danger: #ff3b30;
            --state-success: #34c759;
            --state-warning: #ffcc00;
            --shadow-float: 0 24px 48px -12px rgba(0,0,0,0.08);
            --shadow-glass: inset 0 1px 1px rgba(255,255,255,0.9);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --dur: 3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: #cbd5e1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-main);
            touch-action: pan-y pinch-zoom;
        }

        .video-frame {
            width: 95vw;
            max-width: 1400px;
            height: 90vh;
            max-height: 850px;
            background: var(--bg-base);
            border-radius: 28px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
            border: 8px solid #ffffff;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 6px;
            background: var(--brand-primary);
            width: 40%;
            animation: progressFill var(--dur) linear forwards;
            z-index: 1000;
            border-radius: 0 3px 0 0;
        }

        @keyframes progressFill {
            from { width: 40%; }
            to { width: 50%; }
        }

        .header-overlay {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            gap: 12px;
            flex-wrap: wrap;
        }

        .status-pill {
            background: var(--bg-glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border-subtle);
            border-radius: 99px;
            padding: 8px 16px;
            font-size: clamp(11px, 3vw, 14px);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-float), var(--shadow-glass);
            white-space: nowrap;
        }

        .room-status {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .minimap-container {
            position: absolute;
            bottom: 100px;
            right: 16px;
            width: min(200px, 30vw);
            height: min(130px, 20vh);
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            box-shadow: var(--shadow-float);
            z-index: 150;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .minimap-header {
            height: 28px;
            background: rgba(0,0,0,0.02);
            border-bottom: 1px solid var(--border-strong);
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            gap: 6px;
        }

        .minimap-content {
            flex: 1;
            background: var(--bg-canvas);
            opacity: 0.6;
            position: relative;
        }

        #minimap-view {
            position: absolute;
            border: 2px solid var(--brand-primary);
            background: var(--brand-alpha);
            border-radius: 6px;
            width: 30%;
            height: 30%;
            top: 20px;
            left: 40px;
        }

        .draw-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .draw-layer svg {
            width: 90%;
            max-width: 900px;
            height: auto;
        }

        .static-path {
            fill: none;
            stroke: var(--brand-primary);
            stroke-width: 6;
            stroke-linecap: round;
        }

        .laser-path {
            fill: none;
            stroke: var(--state-danger);
            stroke-width: 8;
            stroke-linecap: round;
            filter: drop-shadow(0 0 12px rgba(255,59,48,0.8));
            stroke-dasharray: 1500;
            stroke-dashoffset: 1500;
            animation: drawLaser 1s cubic-bezier(0.25, 1, 0.5, 1) 1.2s forwards,
                       fadeLaser 0.5s ease-in-out 2.4s forwards;
        }

        .mini-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .mini-path {
            stroke-width: 14;
        }

        @keyframes drawLaser {
            to { stroke-dashoffset: 0; }
        }

        @keyframes fadeLaser {
            to { opacity: 0; }
        }

        .magic-cursor {
            position: absolute;
            width: 36px;
            height: 36px;
            z-index: 999;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="black" stroke="white" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>') no-repeat;
            pointer-events: none;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
            animation: moveCursor5 var(--dur) cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes moveCursor5 {
            0% { transform: translate(650px, 350px) scale(1); }
            20% { transform: translate(720px, 680px) scale(1); }
            24% { transform: translate(720px, 680px) scale(0.7); }
            28% { transform: translate(720px, 680px) scale(1); }
            40% { transform: translate(400px, 300px) scale(1); }
            43% { transform: translate(400px, 300px) scale(0.8); }
            73% { transform: translate(800px, 400px) scale(0.8); }
            76% { transform: translate(800px, 400px) scale(1); }
            100% { transform: translate(900px, 400px) scale(1); }
        }

        .dock-container {
            position: absolute;
            bottom: 16px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 100;
            padding: 0 10px;
        }

        .dock {
            background: var(--bg-glass);
            backdrop-filter: blur(50px);
            border: 1px solid var(--border-subtle);
            border-radius: 28px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: var(--shadow-float);
            overflow-x: auto;
            max-width: 95%;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .dock::-webkit-scrollbar {
            display: none;
        }

        .dock-sep {
            width: 1px;
            height: 32px;
            background: var(--border-strong);
            margin: 0 4px;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.2s;
            cursor: pointer;
            flex-shrink: 0;
        }

        .action-btn.is-active {
            background: var(--brand-primary);
            color: #fff;
            box-shadow: 0 8px 20px var(--brand-alpha);
        }

        .action-btn.laser-active {
            background: var(--state-danger) !important;
            color: #fff !important;
        }

        .color-indicator {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--bg-panel);
        }

        .audio-wave {
            display: flex;
            align-items: center;
            gap: 3px;
            background: var(--bg-base);
            padding: 0 12px;
            height: 44px;
            border-radius: 16px;
            border: 1px inset var(--border-strong);
        }

        .viz-bar {
            width: 3px;
            min-height: 4px;
            background: var(--text-muted);
            border-radius: 3px;
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            .video-frame {
                width: 96vw;
                height: 92vh;
                border-radius: 24px;
                border-width: 5px;
            }

            .header-overlay {
                top: 12px;
                left: 12px;
                right: 12px;
            }

            .status-pill {
                padding: 5px 12px;
                font-size: 10px;
            }

            .action-btn {
                width: 38px;
                height: 38px;
            }

            .audio-wave {
                height: 38px;
                padding: 0 8px;
            }

            .dock-sep {
                height: 26px;
            }

            .minimap-container {
                bottom: 80px;
                right: 12px;
                width: min(150px, 26vw);
                height: min(90px, 16vh);
            }

            .magic-cursor {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .video-frame {
                width: 98vw;
                height: 94vh;
                border-radius: 20px;
            }

            .action-btn {
                width: 34px;
                height: 34px;
            }

            .action-btn i {
                width: 16px;
                height: 16px;
            }

            .color-indicator {
                width: 22px;
                height: 22px;
            }

            .dock {
                padding: 6px 8px;
            }
        }

        @media (hover: none) and (pointer: coarse) {
            .magic-cursor {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="video-frame">
        <div class="progress-bar"></div>

        <div class="header-overlay">
            <div class="room-status">
                <div class="status-pill"><i data-lucide="hash"></i> <span>MR-2364</span></div>
                <div class="status-pill"><i data-lucide="search"></i> <span>100%</span></div>
            </div>
            <div class="status-pill">
                <i data-lucide="crown" style="color: var(--state-warning)"></i> Host
            </div>
        </div>

        <div class="draw-layer">
            <svg viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet">
                <path class="static-path" d="M 200 500 C 400 100, 800 650, 1100 200" />
                <path class="laser-path" d="M 200 350 Q 500 150, 850 200" />
            </svg>
            <div class="magic-cursor"></div>
        </div>

        <div class="minimap-container">
            <div class="minimap-header">
                <i data-lucide="map" size="12"></i><span>Kuzatuv</span>
                <i data-lucide="x" size="12" class="minimap-close"></i>
            </div>
            <div class="minimap-content">
                <div id="minimap-view"></div>
                <svg class="mini-svg" viewBox="0 0 1200 700" preserveAspectRatio="none">
                    <path class="static-path mini-path" d="M 200 500 C 400 100, 800 650, 1100 200" />
                    <path class="laser-path mini-path" d="M 200 350 Q 500 150, 850 200" />
                </svg>
            </div>
        </div>

        <div class="dock-container">
            <div class="dock">
                <div class="action-btn"><i data-lucide="settings-2"></i></div>
                <div class="action-btn"><div class="color-indicator" style="background: #007aff;"></div></div>
                <div class="dock-sep"></div>
                
                <div class="action-btn" id="btn-pencil"><i data-lucide="pencil"></i></div>
                <div class="action-btn laser-active" id="btn-laser"><i data-lucide="wand-2" style="color: #fff;"></i></div>
                
                <div class="action-btn"><i data-lucide="shapes"></i></div>
                <div class="action-btn"><i data-lucide="eraser"></i></div>
                <div class="action-btn"><i data-lucide="hand"></i></div>
                <div class="action-btn"><i data-lucide="type"></i></div>
                <div class="action-btn"><i data-lucide="undo-2"></i></div>
                <div class="dock-sep"></div>
                
                <div class="audio-wave">
                    <i data-lucide="activity"></i>
                    <div class="viz-container">
                        <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
                    </div>
                </div>
                <div class="action-btn" style="color: var(--state-danger); background: rgba(255,59,48,0.08);">
                    <i data-lucide="mic-off"></i>
                </div>
                <div class="action-btn"><i data-lucide="message-square"></i></div>
                <div class="action-btn"><i data-lucide="users"></i></div>
                <div class="dock-sep"></div>
                <div class="action-btn"><i data-lucide="maximize"></i></div>
                <div class="action-btn"><i data-lucide="log-out" style="color: var(--state-danger);"></i></div>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        setTimeout(function() {
            window.location.href = 'part6.html';
        }, 3000);
    </script>
</body>
</html>
