<!DOCTYPE html>
<html lang="uz" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR BOARD - Part 3 (White Theme Interface)</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="video-frame">
        <div class="progress-bar"></div>

        <div class="header-overlay">
            <div class="room-status">
                <div class="status-pill"><i data-lucide="hash"></i> <span>MR-2364</span></div>
                <div class="status-pill"><i data-lucide="search"></i> <span>100%</span></div>
            </div>
            
            <div class="toast-success">
                <i data-lucide="check-circle" size="18"></i> Tizimga ulandingiz!
            </div>
            
            <div class="status-pill role-status">
                <i data-lucide="crown" style="color: var(--state-warning)"></i> Host
            </div>
        </div>

        <div class="board-canvas"></div>

        <div class="minimap-container">
            <div class="minimap-header">
                <i data-lucide="map" size="14"></i><span>Kuzatuv doskasi</span>
                <i data-lucide="x" size="14" class="minimap-close"></i>
            </div>
            <div class="minimap-content">
                <div id="minimap-view"></div>
            </div>
        </div>

        <div class="dock-container">
            <div class="dock">
                <div class="action-btn"><i data-lucide="settings-2"></i></div>
                <div class="action-btn"><div class="color-indicator" style="background: #007aff;"></div></div>
                <div class="dock-sep"></div>
                
                <div class="action-btn is-active"><i data-lucide="pencil"></i></div>
                
                <div class="action-btn"><i data-lucide="wand-2" style="color: var(--state-danger);"></i></div>
                <div class="action-btn"><i data-lucide="shapes"></i></div>
                <div class="action-btn"><i data-lucide="eraser"></i></div>
                <div class="action-btn"><i data-lucide="hand"></i></div>
                <div class="action-btn"><i data-lucide="type"></i></div>
                <div class="action-btn"><i data-lucide="undo-2"></i></div>
                <div class="dock-sep"></div>
                
                <div class="audio-wave">
                    <i data-lucide="activity"></i>
                    <div class="viz-container">
                        <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
                    </div>
                </div>
                
                <div class="action-btn" style="color: var(--state-danger); background: rgba(255,59,48,0.08); border: 1px solid rgba(255,59,48,0.2);">
                    <i data-lucide="mic-off"></i>
                </div>
                
                <div class="action-btn"><i data-lucide="message-square"></i></div>
                <div class="action-btn"><i data-lucide="users"></i></div>
                <div class="dock-sep"></div>
                <div class="action-btn"><i data-lucide="maximize"></i></div>
                <div class="action-btn"><i data-lucide="log-out" style="color: var(--state-danger);"></i></div>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        setTimeout(() => {
            window.location.href = '../part4/index.html';
        }, 3000);
    </script>
</body>
</html>
