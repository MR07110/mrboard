<!DOCTYPE html>
<html lang="uz" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MR BOARD - Part 3 (White Theme Interface)</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* =========================================================
           [1] ORIGINAL ENTERPRISE O'ZGARUVCHILARI (Oq fon uchun)
           ========================================================= */
        :root {
            --bg-base: #ffffff;
            --bg-canvas: #f8fafc;
            --bg-glass: rgba(255,255,255,0.7);
            --bg-panel: rgba(255,255,255,0.9);
            --bg-hover: rgba(0,0,0,0.03);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-subtle: rgba(255,255,255,0.4);
            --border-strong: rgba(0,0,0,0.08);
            --brand-primary: #007aff;
            --brand-alpha: rgba(0,122,255,0.1);
            --state-danger: #ff3b30;
            --state-success: #34c759;
            --state-warning: #ffcc00;
            --shadow-float: 0 24px 48px -12px rgba(0,0,0,0.08), 0 12px 24px -8px rgba(0,0,0,0.04);
            --shadow-glass: inset 0 1px 1px rgba(255,255,255,0.9), inset 0 0 0 1px rgba(255,255,255,0.5);
            --shadow-inner: inset 0 2px 4px rgba(0,0,0,0.03);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --dur: 3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            background: #cbd5e1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-main);
            user-select: none;
            touch-action: pan-y pinch-zoom;
        }

        .video-frame {
            width: 95vw;
            max-width: 1400px;
            height: 90vh;
            max-height: 850px;
            background: var(--bg-base);
            border-radius: 28px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
            border: 8px solid #ffffff;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 6px;
            background: var(--brand-primary);
            width: 20%;
            animation: progressFill var(--dur) linear forwards;
            z-index: 1000;
            border-radius: 0 3px 0 0;
        }

        @keyframes progressFill {
            from { width: 20%; }
            to { width: 30%; }
        }

        .status-pill {
            background: var(--bg-glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border-subtle);
            border-radius: 99px;
            padding: 10px 20px;
            font-size: clamp(11px, 3vw, 14px);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-float), var(--shadow-glass);
            white-space: nowrap;
        }

        .header-overlay {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            opacity: 0;
            animation: dropDown 0.6s var(--ease-spring) 0.1s forwards;
            gap: 12px;
            flex-wrap: wrap;
        }

        @keyframes dropDown {
            0% { opacity: 0; transform: translateY(-40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .room-status {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toast-success {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--state-success);
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            background: rgba(52, 199, 89, 0.08);
            border: 1px solid rgba(52, 199, 89, 0.2);
            box-shadow: 0 4px 12px rgba(52, 199, 89, 0.1);
            animation: fadeOutToast 0.6s ease forwards 0.8s;
        }

        @keyframes fadeOutToast {
            to { opacity: 0; transform: translateY(-20px); }
        }

        .board-canvas {
            position: absolute;
            inset: 0;
            background: var(--bg-base);
            z-index: 10;
        }

        .minimap-container {
            position: absolute;
            bottom: 100px;
            right: 16px;
            width: min(200px, 30vw);
            height: min(130px, 20vh);
            background: var(--bg-panel);
            backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            box-shadow: var(--shadow-float), var(--shadow-glass);
            z-index: 150;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            animation: mapPopIn 0.7s var(--ease-spring) 0.3s forwards;
        }

        @keyframes mapPopIn {
            0% { opacity: 0; transform: scale(0.8) translateY(40px) rotate(5deg); }
            100% { opacity: 1; transform: scale(1) translateY(0) rotate(0deg); }
        }

        .minimap-header {
            height: 28px;
            background: rgba(0,0,0,0.02);
            border-bottom: 1px solid var(--border-strong);
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            gap: 6px;
        }

        .minimap-close {
            color: var(--text-muted);
            margin-left: auto;
            cursor: pointer;
            padding: 4px;
        }

        .minimap-content {
            flex: 1;
            background: var(--bg-canvas);
            opacity: 0.6;
        }

        .dock-container {
            position: absolute;
            bottom: 16px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 100;
            padding: 0 10px;
        }

        .dock {
            background: var(--bg-glass);
            backdrop-filter: blur(50px);
            border: 1px solid var(--border-subtle);
            border-radius: 28px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: var(--shadow-float), var(--shadow-glass);
            opacity: 0;
            animation: slideUpElastic 0.8s var(--ease-spring) 0.2s forwards;
            overflow-x: auto;
            max-width: 95%;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .dock::-webkit-scrollbar {
            display: none;
        }

        @keyframes slideUpElastic {
            0% { transform: translateY(100px) scale(0.8); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .dock-sep {
            width: 1px;
            height: 32px;
            background: var(--border-strong);
            margin: 0 4px;
            border-radius: 2px;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            background: transparent;
            transition: all 0.2s;
            cursor: pointer;
            flex-shrink: 0;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn.is-active {
            background: var(--brand-primary);
            color: #fff;
            box-shadow: 0 8px 20px var(--brand-alpha);
            transform: scale(1.02);
        }

        .color-indicator {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--bg-panel);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .audio-wave {
            display: flex;
            align-items: center;
            gap: 3px;
            background: var(--bg-base);
            padding: 0 12px;
            height: 44px;
            border-radius: 16px;
            border: 1px inset var(--border-strong);
            box-shadow: var(--shadow-inner);
        }

        .viz-container {
            display: flex;
            gap: 2px;
            align-items: center;
        }

        .viz-bar {
            width: 3px;
            min-height: 4px;
            background: var(--text-muted);
            border-radius: 3px;
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            .video-frame {
                width: 96vw;
                height: 92vh;
                border-radius: 24px;
                border-width: 5px;
            }

            .header-overlay {
                top: 12px;
                left: 12px;
                right: 12px;
            }

            .status-pill {
                padding: 6px 12px;
                font-size: 10px;
            }

            .status-pill i {
                width: 14px;
                height: 14px;
            }

            .toast-success {
                padding: 5px 12px;
                font-size: 10px;
            }

            .action-btn {
                width: 40px;
                height: 40px;
            }

            .audio-wave {
                height: 40px;
                padding: 0 10px;
            }

            .dock-sep {
                height: 28px;
            }

            .minimap-container {
                bottom: 80px;
                right: 12px;
                width: min(160px, 28vw);
                height: min(100px, 18vh);
                border-radius: 12px;
            }

            .minimap-header {
                height: 24px;
                font-size: 9px;
                padding: 0 8px;
            }
        }

        @media (max-width: 480px) {
            .video-frame {
                width: 98vw;
                height: 94vh;
                border-radius: 20px;
            }

            .header-overlay {
                top: 8px;
                left: 8px;
                right: 8px;
            }

            .status-pill {
                padding: 4px 10px;
                font-size: 9px;
            }

            .room-status {
                gap: 6px;
            }

            .action-btn {
                width: 36px;
                height: 36px;
            }

            .action-btn i {
                width: 18px;
                height: 18px;
            }

            .audio-wave {
                height: 36px;
                padding: 0 8px;
            }

            .color-indicator {
                width: 24px;
                height: 24px;
            }

            .dock {
                padding: 6px 10px;
                gap: 2px;
            }

            .minimap-container {
                bottom: 70px;
                right: 8px;
            }
        }

        @media (hover: none) and (pointer: coarse) {
            .action-btn:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <div class="video-frame">
        <div class="progress-bar"></div>

        <div class="header-overlay">
            <div class="room-status">
                <div class="status-pill"><i data-lucide="hash"></i> <span>MR-2364</span></div>
                <div class="status-pill"><i data-lucide="search"></i> <span>100%</span></div>
            </div>
            
            <div class="toast-success">
                <i data-lucide="check-circle" size="16"></i> Tizimga ulandingiz!
            </div>
            
            <div class="status-pill role-status">
                <i data-lucide="crown" style="color: var(--state-warning)"></i> Host
            </div>
        </div>

        <div class="board-canvas"></div>

        <div class="minimap-container">
            <div class="minimap-header">
                <i data-lucide="map" size="12"></i><span>Kuzatuv</span>
                <i data-lucide="x" size="12" class="minimap-close"></i>
            </div>
            <div class="minimap-content">
                <div id="minimap-view"></div>
            </div>
        </div>

        <div class="dock-container">
            <div class="dock">
                <div class="action-btn"><i data-lucide="settings-2"></i></div>
                <div class="action-btn"><div class="color-indicator" style="background: #007aff;"></div></div>
                <div class="dock-sep"></div>
                
                <div class="action-btn is-active"><i data-lucide="pencil"></i></div>
                
                <div class="action-btn"><i data-lucide="wand-2" style="color: var(--state-danger);"></i></div>
                <div class="action-btn"><i data-lucide="shapes"></i></div>
                <div class="action-btn"><i data-lucide="eraser"></i></div>
                <div class="action-btn"><i data-lucide="hand"></i></div>
                <div class="action-btn"><i data-lucide="type"></i></div>
                <div class="action-btn"><i data-lucide="undo-2"></i></div>
                <div class="dock-sep"></div>
                
                <div class="audio-wave">
                    <i data-lucide="activity"></i>
                    <div class="viz-container">
                        <div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div>
                    </div>
                </div>
                
                <div class="action-btn" style="color: var(--state-danger); background: rgba(255,59,48,0.08);">
                    <i data-lucide="mic-off"></i>
                </div>
                
                <div class="action-btn"><i data-lucide="message-square"></i></div>
                <div class="action-btn"><i data-lucide="users"></i></div>
                <div class="dock-sep"></div>
                <div class="action-btn"><i data-lucide="maximize"></i></div>
                <div class="action-btn"><i data-lucide="log-out" style="color: var(--state-danger);"></i></div>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        setTimeout(function() {
            window.location.href = 'part4.html';
        }, 3000);
    </script>
</body>
</html>
