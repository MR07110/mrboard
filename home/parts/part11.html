<!DOCTYPE html>
<html lang="uz" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MR BOARD - Part 11 (Matn kiritish)</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #f8fafc;
            --bg-canvas: #e2e8f0;
            --bg-glass: rgba(255,255,255,0.65);
            --bg-panel: rgba(255,255,255,0.85);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-subtle: rgba(255,255,255,0.4);
            --border-strong: rgba(0,0,0,0.1);
            --brand-primary: #007aff;
            --brand-alpha: rgba(0,122,255,0.15);
            --state-danger: #ff3b30;
            --shadow-float: 0 24px 48px -12px rgba(0,0,0,0.15);
            --shadow-glass: inset 0 1px 1px rgba(255,255,255,0.8);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --dur: 3.5s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: #cbd5e1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: pan-y pinch-zoom;
        }

        .video-frame {
            width: 95vw;
            max-width: 1400px;
            height: 90vh;
            max-height: 850px;
            background: var(--bg-canvas);
            background-image: radial-gradient(var(--border-strong) 1px, transparent 1px);
            background-size: 24px 24px;
            border-radius: 28px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
            border: 8px solid #ffffff;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 6px;
            background: var(--brand-primary);
            width: 80%;
            animation: progressFill var(--dur) linear forwards;
            z-index: 1000;
        }

        @keyframes progressFill {
            from { width: 80%; }
            to { width: 85%; }
        }

        .nav-top {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            gap: 10px;
            z-index: 100;
            flex-wrap: wrap;
        }

        .status-pill {
            background: var(--bg-glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border-subtle);
            border-radius: 99px;
            padding: 8px 16px;
            font-size: clamp(11px, 3vw, 14px);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-float);
        }

        .backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            z-index: 200;
            opacity: 0;
            transition: opacity 0.4s var(--ease-spring);
        }

        .backdrop.is-visible {
            opacity: 1;
        }

        .modal-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            padding: 28px;
            border-radius: 32px;
            width: min(420px, 85vw);
            box-shadow: var(--shadow-float);
            border: 1px solid var(--border-subtle);
            opacity: 0;
            transition: all 0.5s var(--ease-spring);
            z-index: 201;
        }

        .modal-box.is-visible {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .modal-box h2 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-box textarea {
            width: 100%;
            min-height: 120px;
            padding: 16px;
            border-radius: 20px;
            border: 1.5px solid var(--border-strong);
            background: var(--bg-base);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            margin: 16px 0;
            outline: none;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--brand-primary);
            color: #fff;
        }

        .btn-ghost {
            background: var(--bg-base);
            color: var(--text-main);
            border: 1.5px solid var(--border-strong);
        }

        .dock-container {
            position: absolute;
            bottom: 16px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 100;
            padding: 0 10px;
        }

        .dock {
            background: var(--bg-glass);
            backdrop-filter: blur(50px);
            border: 1px solid var(--border-subtle);
            border-radius: 28px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: var(--shadow-float);
            overflow-x: auto;
            max-width: 95%;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .dock::-webkit-scrollbar {
            display: none;
        }

        .dock-sep {
            width: 1px;
            height: 32px;
            background: var(--border-strong);
            margin: 0 4px;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.2s;
            cursor: pointer;
            flex-shrink: 0;
        }

        .action-btn.is-active {
            background: var(--brand-primary);
            color: #fff;
            box-shadow: 0 8px 20px var(--brand-alpha);
        }

        .color-indicator {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--bg-panel);
        }

        .magic-cursor {
            position: absolute;
            width: 36px;
            height: 36px;
            z-index: 999;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="black" stroke="white" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>') no-repeat;
            pointer-events: none;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
            animation: moveCursor11 var(--dur) var(--ease-spring) forwards;
        }

        @keyframes moveCursor11 {
            0% { transform: translate(1100px, 350px); }
            15% { transform: translate(740px, 680px); }
            20% { transform: translate(740px, 680px) scale(0.8); }
            25% { transform: translate(740px, 680px) scale(1); }
            40% { transform: translate(620px, 450px); }
            45% { transform: translate(620px, 450px) scale(0.8); }
            60% { transform: translate(600px, 520px); }
            80% { transform: translate(800px, 580px); }
            85% { transform: translate(800px, 580px) scale(0.9); }
            100% { transform: translate(1000px, 500px); }
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            .video-frame {
                width: 96vw;
                height: 92vh;
                border-radius: 24px;
                border-width: 5px;
            }
            .status-pill {
                padding: 5px 12px;
                font-size: 10px;
            }
            .action-btn {
                width: 38px;
                height: 38px;
            }
            .dock-sep {
                height: 26px;
            }
            .modal-box {
                padding: 20px;
                width: 90vw;
            }
            .modal-box textarea {
                min-height: 100px;
                font-size: 14px;
            }
            .btn {
                padding: 10px 20px;
                font-size: 13px;
            }
            .magic-cursor {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .video-frame {
                width: 98vw;
                height: 94vh;
                border-radius: 20px;
            }
            .action-btn {
                width: 34px;
                height: 34px;
            }
            .action-btn i {
                width: 16px;
                height: 16px;
            }
            .color-indicator {
                width: 22px;
                height: 22px;
            }
            .dock {
                padding: 6px 8px;
            }
            .modal-box h2 {
                font-size: 18px;
            }
        }

        @media (hover: none) and (pointer: coarse) {
            .magic-cursor {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="video-frame">
        <div class="progress-bar"></div>

        <div class="nav-top">
            <div class="status-pill"><i data-lucide="hash"></i> <span>MR-ULTIMATE</span></div>
            <div class="status-pill"><i data-lucide="eye"></i> <span>Enterprise</span></div>
        </div>

        <div class="backdrop" id="backdrop"></div>
        
        <div class="modal-box" id="modal-box">
            <h2>Doskaga matn kiritish</h2>
            <textarea id="typing-area" readonly placeholder="Matnni bu yerga yozing (Maks 300 belgi)"></textarea>
            <div class="modal-actions">
                <button class="btn btn-ghost">Bekor qilish</button>
                <button class="btn btn-primary" id="btn-add">Doskaga qo'shish</button>
            </div>
        </div>

        <div class="magic-cursor"></div>

        <svg width="100%" height="100%" style="position:absolute; pointer-events:none; z-index:10;">
            <path d="M 150 500 C 400 100, 700 700, 1100 200" fill="none" stroke="#007aff" stroke-width="6" stroke-linecap="round" opacity="0.4" />
        </svg>

        <div class="dock-container">
            <div class="dock">
                <div class="action-btn"><i data-lucide="settings-2"></i></div>
                <div class="action-btn"><div class="color-indicator" style="background: #007aff;"></div></div>
                <div class="dock-sep"></div>
                <div class="action-btn"><i data-lucide="pencil"></i></div>
                <div class="action-btn"><i data-lucide="wand-2" style="color: var(--state-danger)"></i></div>
                <div class="action-btn"><i data-lucide="shapes"></i></div>
                <div class="action-btn" id="dock-erase"><i data-lucide="eraser"></i></div>
                <div class="action-btn" id="dock-pan"><i data-lucide="hand"></i></div>
                <div class="action-btn is-active" id="dock-text"><i data-lucide="type"></i></div>
                <div class="action-btn"><i data-lucide="undo-2"></i></div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const backdrop = document.getElementById('backdrop');
        const modal = document.getElementById('modal-box');
        const typingArea = document.getElementById('typing-area');
        const dockText = document.getElementById('dock-text');
        const dockErase = document.getElementById('dock-erase');
        const btnAdd = document.getElementById('btn-add');

        setTimeout(function() {
            dockErase.classList.remove('is-active');
            dockText.classList.add('is-active');
        }, 800);

        setTimeout(function() {
            backdrop.classList.add('is-visible');
            modal.classList.add('is-visible');
        }, 1600);

        const message = "MR BOARD Enterprise - Ishni boshlaymiz!";
        setTimeout(function() {
            let i = 0;
            const typing = setInterval(function() {
                typingArea.value += message[i];
                i++;
                if(i >= message.length) clearInterval(typing);
            }, 40);
        }, 2100);

        setTimeout(function() {
            btnAdd.style.transform = "scale(0.94)";
            btnAdd.style.filter = "brightness(0.9)";
        }, 3000);

        setTimeout(function() {
            window.location.href = 'part12.html';
        }, 3600);
    </script>
</body>
</html>
