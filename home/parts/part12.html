<!DOCTYPE html>
<html lang="uz" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MR BOARD - Part 12 (Matnni kattalashtirish)</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #f8fafc;
            --bg-canvas: #e2e8f0;
            --bg-glass: rgba(255,255,255,0.65);
            --bg-panel: rgba(255,255,255,0.85);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-subtle: rgba(255,255,255,0.4);
            --border-strong: rgba(0,0,0,0.1);
            --brand-primary: #007aff;
            --brand-alpha: rgba(0,122,255,0.15);
            --shadow-float: 0 24px 48px -12px rgba(0,0,0,0.15);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --dur: 3.5s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: #cbd5e1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: pan-y pinch-zoom;
        }

        .video-frame {
            width: 95vw;
            max-width: 1400px;
            height: 90vh;
            max-height: 850px;
            background: var(--bg-canvas);
            background-image: radial-gradient(var(--border-strong) 1px, transparent 1px);
            background-size: 24px 24px;
            border-radius: 28px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
            border: 8px solid #ffffff;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 6px;
            background: var(--brand-primary);
            width: 85%;
            animation: progressFill var(--dur) linear forwards;
            z-index: 1000;
        }

        @keyframes progressFill {
            from { width: 85%; }
            to { width: 90%; }
        }

        .text-object {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 20px;
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 800;
            color: var(--brand-primary);
            white-space: nowrap;
            user-select: none;
            opacity: 0;
            animation: textPopIn 0.6s var(--ease-spring) 0.4s forwards;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
            white-space: normal;
            text-align: center;
            max-width: 90vw;
            line-height: 1.3;
        }

        @keyframes textPopIn {
            0% { opacity: 0; transform: translate(-50%, -40%) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .selection-frame {
            position: absolute;
            inset: -10px;
            border: 2px solid var(--brand-primary);
            border-radius: 8px;
            background: var(--brand-alpha);
            pointer-events: none;
        }

        .handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #fff;
            border: 2px solid var(--brand-primary);
            border-radius: 50%;
        }

        .nw { top: -6px; left: -6px; }
        .ne { top: -6px; right: -6px; }
        .sw { bottom: -6px; left: -6px; }
        .se { bottom: -6px; right: -6px; }

        .magic-cursor {
            position: absolute;
            width: 36px;
            height: 36px;
            z-index: 999;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="black" stroke="white" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>') no-repeat;
            pointer-events: none;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
            animation: moveCursor12 var(--dur) var(--ease-spring) forwards;
        }

        @keyframes moveCursor12 {
            0% { transform: translate(1000px, 500px); }
            20% { transform: translate(650px, 450px); }
            40% { transform: translate(840px, 515px); }
            50% { transform: translate(840px, 515px) scale(0.8); }
            70% { transform: translate(900px, 560px); }
            85% { transform: translate(150px, 150px); }
            100% { transform: translate(-100px, 100px); }
        }

        .dock-container {
            position: absolute;
            bottom: 16px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 100;
            padding: 0 10px;
        }

        .dock {
            background: var(--bg-glass);
            backdrop-filter: blur(50px);
            border: 1px solid var(--border-subtle);
            border-radius: 28px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: var(--shadow-float);
            overflow-x: auto;
            max-width: 95%;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .dock::-webkit-scrollbar {
            display: none;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.2s;
            cursor: pointer;
            flex-shrink: 0;
        }

        .action-btn.is-active {
            background: var(--brand-primary);
            color: #fff;
            box-shadow: 0 8px 20px var(--brand-alpha);
        }

        .color-indicator {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--bg-panel);
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            .video-frame {
                width: 96vw;
                height: 92vh;
                border-radius: 24px;
                border-width: 5px;
            }
            .action-btn {
                width: 38px;
                height: 38px;
            }
            .magic-cursor {
                display: none;
            }
            .text-object {
                font-size: clamp(18px, 5vw, 28px);
                padding: 10px 16px;
            }
            .handle {
                width: 10px;
                height: 10px;
            }
        }

        @media (max-width: 480px) {
            .video-frame {
                width: 98vw;
                height: 94vh;
                border-radius: 20px;
            }
            .action-btn {
                width: 34px;
                height: 34px;
            }
            .action-btn i {
                width: 16px;
                height: 16px;
            }
            .color-indicator {
                width: 22px;
                height: 22px;
            }
            .dock {
                padding: 6px 8px;
            }
        }

        @media (hover: none) and (pointer: coarse) {
            .magic-cursor {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="video-frame">
        <div class="progress-bar"></div>

        <div class="text-object" id="text-obj">
            MR BOARD Enterprise - Ishni boshlaymiz!
            <div class="selection-frame">
                <div class="handle nw"></div>
                <div class="handle ne"></div>
                <div class="handle sw"></div>
                <div class="handle se"></div>
            </div>
        </div>

        <div class="magic-cursor"></div>

        <div class="dock-container">
            <div class="dock">
                <div class="action-btn"><i data-lucide="settings-2"></i></div>
                <div class="action-btn"><div class="color-indicator" style="background: #007aff;"></div></div>
                <div class="dock-sep"></div>
                <div class="action-btn"><i data-lucide="pencil"></i></div>
                <div class="action-btn"><i data-lucide="wand-2" style="color: #ff3b30"></i></div>
                <div class="action-btn"><i data-lucide="shapes"></i></div>
                <div class="action-btn"><i data-lucide="eraser"></i></div>
                <div class="action-btn"><i data-lucide="hand"></i></div>
                <div class="action-btn is-active"><i data-lucide="type"></i></div>
                <div class="action-btn"><i data-lucide="undo-2"></i></div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const textObj = document.getElementById('text-obj');

        setTimeout(function() {
            textObj.style.transition = "all 0.8s cubic-bezier(0.25, 1, 0.5, 1)";
            textObj.style.fontSize = "clamp(28px, 8vw, 42px)";
        }, 2100);

        setTimeout(function() {
            window.location.href = 'part13.html';
        }, 3600);
    </script>
</body>
</html>
